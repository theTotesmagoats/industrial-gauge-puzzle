<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal Mk IV - Operation Vanguard</title>
    <style>
        body {
            background-color: #050505;
            color: #33FF00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            text-shadow: 0 0 5px #33FF00;
        }
        
        /* CRT Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 10px;
            padding-right: 10px;
        }

        #input-line {
            display: flex;
            align-items: center;
            font-weight: bold;
        }

        #prompt { margin-right: 10px; }

        input[type="text"] {
            background: transparent;
            border: none;
            color: #33FF00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1em;
            flex-grow: 1;
            outline: none;
            text-transform: uppercase;
            text-shadow: 0 0 5px #33FF00;
        }
    </style>
</head>
<body>

<div id="output"></div>
<div id="input-line">
    <span id="prompt">C:\></span>
    <input type="text" id="cmd" autocomplete="off" autofocus>
</div>

<script>
    const outputDiv = document.getElementById('output');
    const inputField = document.getElementById('cmd');
    const promptSpan = document.getElementById('prompt');

    // Engine State
    let state = 'BOOT';
    let isTyping = false;
    
    // Consequence Variables (Second Order Effects)
    let alertLevel = 0;
    let signalBoosted = false;
    let triangulationRisk = 0;

    const printText = (text, speed = 20, callback = null) => {
        isTyping = true;
        inputField.disabled = true;
        let i = 0;
        const interval = setInterval(() => {
            outputDiv.innerHTML += text.charAt(i);
            outputDiv.scrollTop = outputDiv.scrollHeight;
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                outputDiv.innerHTML += '<br>';
                isTyping = false;
                inputField.disabled = false;
                inputField.focus();
                if (callback) callback();
            }
        }, speed);
    };

    const handleInput = (rawCmd) => {
        if (isTyping) return;
        const cmd = rawCmd.trim().toUpperCase();
        outputDiv.innerHTML += `<br><span style="color:#FFF">> ${cmd}</span><br>`;
        inputField.value = '';

        switch (state) {
            case 'BOOT':
                processBoot(cmd);
                break;
            case 'CONNECTED':
                processCommand(cmd);
                break;
            case 'CALC_EXTRACT':
                processExtraction(cmd);
                break;
        }
    };

    const processBoot = (cmd) => {
        if (cmd === 'HELP') {
            printText("SYSTEM FAULT: PREVIOUS OPERATOR EXPUNGED (KIA). OVERRIDE REQUIRED.\nAUTHORIZATION CIPHER IN USE: SHIFT -3.\nENCRYPTED KEY: 'WDUJHW'\nENTER DECRYPTED KEY:");
            return;
        }
        
        if (cmd === 'TARGET') {
            printText("AUTHORIZATION ACCEPTED. WELCOME TO TERMINAL MK IV.\nDO NOT SPILL COFFEE ON THE CONSOLE. PENALTY IS TREASON.\nTYPE 'HELP' FOR COMMAND OPERATIONS.", 20, () => {
                state = 'CONNECTED';
                promptSpan.innerText = "HQ_LINK>";
            });
        } else {
            alertLevel++;
            printText(`INVALID KEY. THE GESTAPO HAS BEEN NOTIFIED OF YOUR INCOMPETENCE.\nALERT LEVEL: ${alertLevel}/3. TYPE 'HELP' IF YOU LACK BASIC TRAINING.`);
            if (alertLevel >= 3) {
                printText("\n*** CRITICAL ALERT: BUNKER DOORS BREACHED. TERMINAL PURGING. YOU HAVE FAILED. ***", 50, () => {
                    inputField.style.display = 'none';
                });
            }
        }
    };

    const processCommand = (cmd) => {
        if (cmd === 'HELP') {
            printText("AVAILABLE COMMANDS:\n- STATUS     : CHECK SYSTEM AND ALERT LEVELS\n- BOOST_SIG  : AMPLIFY RADIO TO COMMAND (WARNING: INCREASES DETECTION RISK)\n- REQ_EXTRACT: REQUEST EXTRACTION COORDINATES FROM HQ");
        } else if (cmd === 'STATUS') {
            printText(`SYSTEM: NOMINAL.\nOPERATOR STATUS: ALIVE (TEMPORARILY).\nTRIANGULATION RISK: ${triangulationRisk}%`);
        } else if (cmd === 'BOOST_SIG') {
            if (signalBoosted) {
                printText("SIGNAL ALREADY AT MAXIMUM. STOP MASHING THE BUTTON.");
            } else {
                signalBoosted = true;
                triangulationRisk += 40;
                printText("WARNING: SIGNAL BOOSTED. TRANSMISSION CLARITY SECURED.\nCONSEQUENCE: GERMAN RDF STATIONS ARE LOCKING ONTO THIS SECTOR.");
            }
        } else if (cmd === 'REQ_EXTRACT') {
            if (!signalBoosted) {
                printText("TRANSMISSION FAILED. STATIC INTERFERENCE TOO HIGH. HQ CANNOT HEAR YOU. CONSIDER YOUR SIGNAL STRENGTH.");
            } else {
                state = 'CALC_EXTRACT';
                let timeWindow = 45 - (triangulationRisk * 0.25); // Math consequence
                printText(`HQ CONNECTED.\n"Listen up. Patrols are moving in. We are holding a C-47 transport at Sector Grid 70-X."\n"You are currently at Sector Grid 40-X. The distance is exactly 30 kilometers."\n"You must travel at a sprint pace of 10 kilometers per hour."\n"Due to your signal noise, we can only keep the plane waiting for ${timeWindow} hours."\n\nCALCULATE: How many hours will it take you to reach the transport?\nENTER HOURS:`);
            }
        } else {
            printText("COMMAND UNRECOGNIZED. STOP TYPING GIBBERISH AND WIN THE WAR.");
        }
    };

    const processExtraction = (cmd) => {
        let answer = parseFloat(cmd);
        if (answer === 3) {
            let timeWindow = 45 - (triangulationRisk * 0.25);
            if (3 <= timeWindow) {
                printText("COORDINATES LOCKED. THE MATH CHECKS OUT.\nGRAB YOUR GEAR. WE WILL SEE YOU IN LONDON.\n\n*** MISSION SUCCESS ***");
                inputField.style.display = 'none';
            } else {
                printText("THE MATH IS CORRECT, BUT YOU TOOK TOO LONG. THE PLANE LEFT.\nYOUR DECISION TO BOOST THE SIGNAL BROUGHT THE PATROLS TOO FAST.\n\n*** MISSION FAILED ***");
                inputField.style.display = 'none';
            }
        } else {
            printText("INCORRECT CALCULATION. IF YOU CAN'T DO MATH, YOU CAN'T BE RESCUED. TRY AGAIN:");
        }
    };

    // Init
    printText("BOOT SEQUENCE INITIATED...\nESTABLISHING SECURE CONNECTION...\nERROR: CONNECTION LOCKED. TYPE 'HELP' TO DIAGNOSE.", 30);

    inputField.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            handleInput(inputField.value);
        }
    });
</script>

</body>
</html>
