<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Princess Room Decorator</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #ffe4e1; /* Stone wall */
            touch-action: none; /* Critical for preventing mobile scroll during drag */
        }
        canvas { display: block; }
    </style>
</head>
<body>

<canvas id="stage"></canvas>

<script>
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    let width, height;

    // Thematic SVGs (Base64)
    const svgs = {
        princess: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA4MCAxMDAiPjxwb2x5Z29uIHBvaW50cz0iNDAsMzAgMTAsOTAgNzAsOTAiIGZpbGw9IiNGRjE0OTMiLz48Y2lyY2xlIGN4PSI0MCIgY3k9IjIwIiByPSIxNSIgZmlsbD0iI0ZGRDAwMCIvPjwvc3ZnPg==',
        bed: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgNjAiPjxyZWN0IHg9IjAiIHk9IjMwIiB3aWR0aD0iMTAwIiBoZWlnaHQ9IjMwIiBmaWxsPSIjZmZhZmJkIi8+PHJlY3QgeD0iMTAiIHk9IjIwIiB3aWR0aD0iODAiIGhlaWdodD0iMjAiIGZpbGw9IiNmZmZmZmYiLz48cmVjdCB4PSI1IiB5PSIxMCIgd2lkdGg9IjIwIiBoZWlnaHQ9IjIwIiBmaWxsPSIjZmZiNmMxIi8+PC9zdmc+',
        drape: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA0MCAxMDAiPjxwYXRoIGQ9Ik0wLDBIMjBDNDAsMCw0MCwxMDAsMjAsMTAwSDBaIiBmaWxsPSIjRkY2OUI0Ii8+PC9zdmc+',
        clock: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2MCAxMDAiPjxyZWN0IHg9IjIwIiB5PSIyMCIgd2lkdGg9IjIwIiBoZWlnaHQ9IjgwIiBmaWxsPSIjOGI0NTEzIi8+PGNpcmNsZSBjeD0iMzAiIGN5PSIyMCIgcj0iMjAiIGZpbGw9IiNmZmQ3MDAiLz48Y2lyY2xlIGN4PSIzMCIgY3k9IjIwIiByPSIxNSIgZmlsbD0iI2ZmZmZmZiIvPjxwYXRoIGQ9Ik0zMCwyMEwzMCwxME0zMCwyMEwzOCwyNCIgc3Ryb2tlPSIjMDAwIiBzdHJva2Utd2lkdGg9IjIiLz48L3N2Zz4=',
        chandelier: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgNjAiPjxwYXRoIGQ9Ik01MCwwTDUwLDIwTDIwLDUwTTUwLDIwTDgwLDUwTTQwLDQwTDQwLDMwTTYwLDQwTDYwLDMwIiBzdHJva2U9IiNmZmQ3MDAiIGZpbGw9Im5vbmUiIHN0cm9rZS13aWR0aD0iMyIvPjxjaXJjbGUgY3g9IjIwIiBjeT0iNTAiIHI9IjUiIGZpbGw9IiNmZmZmYmIiLz48Y2lyY2xlIGN4PSI0MCIgY3k9IjMwIiByPSI1IiBmaWxsPSIjZmZmZmJiIi8+PGNpcmNsZSBjeD0iNjAiIGN5PSIzMCIgcj0iNSIgZmlsbD0iI2ZmZmZiYiIvPjxjaXJjbGUgY3g9IjgwIiBjeT0iNTAiIHI9IjUiIGZpbGw9IiNmZmZmYmIiLz48L3N2Zz4='
    };

    let items = [];
    let isDragging = false;
    let dragTarget = null;
    let offsetX = 0;
    let offsetY = 0;

    function initItems() {
        // Pre-instantiate the objects she can move around
        const startY = height - 120; // Bottom "tray" area
        
        const loadImg = (src) => {
            let img = new Image();
            img.src = src;
            return img;
        };

        items = [
            { img: loadImg(svgs.drape), x: width * 0.1, y: startY, w: 60, h: 150 },
            { img: loadImg(svgs.drape), x: width * 0.2, y: startY, w: 60, h: 150 }, // Two drapes for symmetry
            { img: loadImg(svgs.chandelier), x: width * 0.35, y: startY, w: 100, h: 60 },
            { img: loadImg(svgs.clock), x: width * 0.5, y: startY, w: 50, h: 120 },
            { img: loadImg(svgs.bed), x: width * 0.7, y: startY, w: 160, h: 100 },
            { img: loadImg(svgs.princess), x: width * 0.9, y: startY, w: 80, h: 100 }
        ];
    }

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        if(items.length === 0) initItems();
    }

    // Input Handling
    canvas.addEventListener('pointerdown', (e) => {
        const mx = e.clientX;
        const my = e.clientY;

        // Iterate backwards to grab the item drawn on top
        for (let i = items.length - 1; i >= 0; i--) {
            let item = items[i];
            // Bounding box collision detection
            if (mx >= item.x - item.w/2 && mx <= item.x + item.w/2 &&
                my >= item.y - item.h/2 && my <= item.y + item.h/2) {
                
                isDragging = true;
                dragTarget = item;
                // Calculate offset so the object doesn't snap its center to the cursor
                offsetX = mx - item.x;
                offsetY = my - item.y;

                // Move selected item to end of array to draw on top of others
                items.push(items.splice(i, 1)[0]);
                break;
            }
        }
    });

    canvas.addEventListener('pointermove', (e) => {
        if (!isDragging || !dragTarget) return;
        dragTarget.x = e.clientX - offsetX;
        dragTarget.y = e.clientY - offsetY;
    });

    window.addEventListener('pointerup', () => {
        isDragging = false;
        dragTarget = null;
    });

    function draw() {
        ctx.clearRect(0, 0, width, height);

        // Draw Environment (Static)
        // Walls
        ctx.fillStyle = '#ffe4e1'; 
        ctx.fillRect(0, 0, width, height);
        // Window Background
        ctx.fillStyle = '#ffeff0';
        ctx.fillRect(width * 0.3, height * 0.1, width * 0.4, height * 0.5);
        // Window Frame
        ctx.strokeStyle = '#ffb6c1';
        ctx.lineWidth = 10;
        ctx.strokeRect(width * 0.3, height * 0.1, width * 0.4, height * 0.5);
        // Floor / Carpet
        ctx.fillStyle = '#ff69b4';
        ctx.fillRect(0, height * 0.65, width, height * 0.35);

        // Draw Interactive Items
        items.forEach(item => {
            if(item.img.complete) {
                ctx.drawImage(item.img, item.x - item.w/2, item.y - item.h/2, item.w, item.h);
            }
        });

        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
</script>
</body>
</html>
