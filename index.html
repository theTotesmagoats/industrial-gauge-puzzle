<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal Mk IV - Operation Vanguard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'VT323', monospace;
            overflow: hidden;
        }

        /* Industrial Bezel Maximized */
        #chassis {
            background-color: #2a2c29;
            width: 95vw;
            height: 95vh;
            padding: 30px;
            border-radius: 8px;
            box-sizing: border-box;
            box-shadow: 
                inset 0 0 20px #0a0a0a,
                0 0 40px rgba(0,0,0,0.9);
            border: 4px solid #151515;
            position: relative;
            display: flex;
        }

        /* Rivets */
        .rivet {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #1a1a1a;
            border-radius: 50%;
            box-shadow: inset 2px 2px 3px #444, inset -2px -2px 3px #000;
        }
        .r-tl { top: 8px; left: 8px; }
        .r-tr { top: 8px; right: 8px; }
        .r-bl { bottom: 8px; left: 8px; }
        .r-br { bottom: 8px; right: 8px; }

        /* CRT Screen Maximized */
        #screen {
            background-color: #030803;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: inset 0 0 60px #000;
            border: 6px solid #0a0a0a;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #33FF00;
            text-shadow: 0 0 6px #33FF00;
            font-size: 1.8rem; /* Increased for the VT323 font */
            letter-spacing: 1px;
        }

        #screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 2;
            background-size: 100% 4px;
            pointer-events: none;
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 10px;
            padding-right: 15px;
            z-index: 3;
            line-height: 1.2;
        }

        #input-line {
            display: flex;
            align-items: center;
            font-weight: bold;
            z-index: 3;
        }

        #prompt { margin-right: 15px; }

        input[type="text"] {
            background: transparent;
            border: none;
            color: #33FF00;
            font-family: 'VT323', monospace;
            font-size: 1em;
            flex-grow: 1;
            outline: none;
            text-transform: uppercase;
            text-shadow: 0 0 6px #33FF00;
            letter-spacing: 1px;
        }

        /* Cipher Hover Mechanic */
        .cipher-hint {
            cursor: help;
            border-bottom: 2px dotted #33FF00;
            position: relative;
            color: #FFFFCC; 
        }
        
        .cipher-hint:hover::after {
            content: "DECRYPTION LOGIC [SHIFT -3]:\A W -> T\A D -> A\A U -> R\A J -> G\A H -> E\A W -> T\A ========================\A FINAL ANSWER: TARGET\A (TYPE 'TARGET' TO BYPASS)";
            position: absolute;
            bottom: 125%; 
            left: 50%;
            transform: translateX(-50%); 
            width: max-content; 
            max-width: 80vw; 
            background: #051105;
            border: 2px solid #33FF00;
            padding: 15px;
            white-space: pre-wrap; 
            z-index: 10;
            box-shadow: 0 0 20px #000;
            pointer-events: none;
            color: #33FF00;
            line-height: 1.2;
        }
    </style>
</head>
<body>

<div id="chassis">
    <div class="rivet r-tl"></div>
    <div class="rivet r-tr"></div>
    <div class="rivet r-bl"></div>
    <div class="rivet r-br"></div>
    <div id="screen">
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt">SYS_INIT></span>
            <input type="text" id="cmd" autocomplete="off" autofocus>
        </div>
    </div>
</div>

<script>
    const outputDiv = document.getElementById('output');
    const inputField = document.getElementById('cmd');
    const promptSpan = document.getElementById('prompt');

    // Engine Variables
    let state = 'DIFFICULTY_SELECT';
    let isTyping = false;
    let easyMode = false;
    
    // Tactical & Environmental Variables
    let alertLevel = 0;
    let signalBoosted = 0; // Changed to integer to track multiple boosts
    let triangulationRisk = 0;
    let inventory = [];
    let environment = {
        'DESK': ['COMPASS'],
        'LOCKER': ['DOSSIER', 'RATIONS']
    };

    // Procedural Audio Engine
    let audioCtx;
    let staticGainNode;

    const initAudio = () => {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startStaticNoise();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    };

    const startStaticNoise = () => {
        const bufferSize = audioCtx.sampleRate * 2; 
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;
        
        // Lowpass filter to muffle the harsh digital white noise into AM radio static
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1200;

        staticGainNode = audioCtx.createGain();
        staticGainNode.gain.value = 0.01; // Barely audible baseline

        noise.connect(filter);
        filter.connect(staticGainNode);
        staticGainNode.connect(audioCtx.destination);
        noise.start();
    };

    const playClick = () => {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;

        // The "Click" (High frequency mechanical snap)
        const oscHigh = audioCtx.createOscillator();
        const gainHigh = audioCtx.createGain();
        oscHigh.type = 'triangle';
        oscHigh.frequency.setValueAtTime(800, t);
        oscHigh.frequency.exponentialRampToValueAtTime(100, t + 0.02);
        gainHigh.gain.setValueAtTime(0.3, t);
        gainHigh.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
        oscHigh.connect(gainHigh).connect(audioCtx.destination);
        oscHigh.start(t);
        oscHigh.stop(t + 0.02);

        // The "Clack" (Lower frequency mechanical thud)
        const oscLow = audioCtx.createOscillator();
        const gainLow = audioCtx.createGain();
        oscLow.type = 'square';
        oscLow.frequency.setValueAtTime(200, t);
        oscLow.frequency.exponentialRampToValueAtTime(40, t + 0.04);
        gainLow.gain.setValueAtTime(0.4, t);
        gainLow.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
        oscLow.connect(gainLow).connect(audioCtx.destination);
        oscLow.start(t);
        oscLow.stop(t + 0.04);
    };

    inputField.addEventListener('input', () => {
        if (inputField.value.trim() !== '') {
            initAudio(); 
            playClick();
        }
    });

    const printText = (text, speed = 40, callback = null) => {
        isTyping = true;
        inputField.disabled = true;
        let i = 0;
        
        if (text.includes('<span')) {
            outputDiv.innerHTML += text + '<br><br>';
            outputDiv.scrollTop = outputDiv.scrollHeight;
            isTyping = false;
            inputField.disabled = false;
            inputField.focus();
            if (callback) callback();
            return;
        }

        const interval = setInterval(() => {
            outputDiv.innerHTML += text.charAt(i);
            if (text.charAt(i) !== ' ' && text.charAt(i) !== '\n') playClick();
            outputDiv.scrollTop = outputDiv.scrollHeight;
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                outputDiv.innerHTML += '<br><br>';
                isTyping = false;
                inputField.disabled = false;
                inputField.focus();
                if (callback) callback();
            }
        }, speed);
    };

    const handleInput = (rawCmd) => {
        if (isTyping) return;
        initAudio();
        const cmd = rawCmd.trim().toUpperCase();
        outputDiv.innerHTML += `<span style="color:#FFF">> ${cmd}</span><br>`;
        inputField.value = '';

        switch (state) {
            case 'DIFFICULTY_SELECT':
                processDifficulty(cmd);
                break;
            case 'BOOT':
                processBoot(cmd);
                break;
            case 'CONNECTED':
                processCommand(cmd);
                break;
            case 'CALC_EXTRACT':
                processExtraction(cmd);
                break;
        }
    };

    const processDifficulty = (cmd) => {
        if (cmd === '1' || cmd === '2') {
            easyMode = (cmd === '2');
            state = 'BOOT';
            promptSpan.innerText = "C:\\>";
            printText("CONFIGURING HARDWARE...\nWAITING FOR VACUUM TUBES TO WARM UP...\nCONNECTION LOCKED. TYPE 'HELP' TO DIAGNOSE.");
        } else {
            printText("INVALID SELECTION. ENTER 1 OR 2.");
        }
    };

    const processBoot = (cmd) => {
        if (cmd === 'HELP') {
            let cipherString = easyMode ? '<span class="cipher-hint">WDUJHW</span>' : 'WDUJHW';
            printText(`SYSTEM FAULT: ALLIED OVERRIDE REQUIRED.\nAUTHORIZATION CIPHER IN USE: CAESAR SHIFT -3.\nINTERCEPTED KEY: ${cipherString}\nENTER DECRYPTED KEY:`);
            return;
        }
        
        if (cmd === 'TARGET') {
            printText("AUTHORIZATION ACCEPTED. WELCOME TO TERMINAL MK IV.\nTYPE 'HELP' FOR TACTICAL OPERATIONS.", 40, () => {
                state = 'CONNECTED';
                promptSpan.innerText = "HQ_LINK>";
            });
        } else {
            alertLevel++;
            printText(`INVALID KEY. THE GESTAPO HAS BEEN NOTIFIED OF YOUR INCOMPETENCE.\nALERT LEVEL: ${alertLevel}/3. TYPE 'HELP'.`);
            if (alertLevel >= 3) {
                printText("*** CRITICAL ALERT: BUNKER DOORS BREACHED. TERMINAL PURGING. YOU HAVE FAILED. ***", 60, () => {
                    inputField.style.display = 'none';
                    if(staticGainNode) staticGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
                });
            }
        }
    };

    const processCommand = (cmd) => {
        const args = cmd.split(' ');
        const action = args[0];
        const target = args[1];

        if (action === 'HELP') {
            printText("AVAILABLE COMMANDS:\n- STATUS     : CHECK SYSTEM AND TRIANGULATION RISKS\n- SEARCH [X] : SEARCH ENVIRONMENT (E.G., SEARCH DESK, SEARCH LOCKER)\n- TAKE [X]   : ACQUIRE ITEM (E.G., TAKE COMPASS)\n- INV        : CHECK INVENTORY\n- BOOST_SIG  : AMPLIFY RADIO (WARNING: INCREASES DETECTION RISK)\n- REQ_EXTRACT: REQUEST EXTRACTION COORDINATES");
        } else if (action === 'STATUS') {
            printText(`SYSTEM: NOMINAL.\nOPERATOR STATUS: ALIVE.\nTRIANGULATION RISK: ${triangulationRisk}%\nRADIO AMPLIFICATION LEVEL: ${signalBoosted}`);
        } else if (action === 'SEARCH') {
            if (!target) {
                printText("SPECIFY TARGET: SEARCH DESK OR SEARCH LOCKER.");
            } else if (environment[target]) {
                if (environment[target].length > 0) {
                    printText(`SCANNED ${target}. IDENTIFIED ASSETS: ${environment[target].join(', ')}.`);
                } else {
                    printText(`${target} IS EMPTY.`);
                }
            } else {
                printText("TARGET NOT FOUND IN IMMEDIATE VICINITY.");
            }
        } else if (action === 'TAKE') {
            if (!target) {
                printText("SPECIFY ITEM TO TAKE.");
            } else {
                let found = false;
                for (let key in environment) {
                    const index = environment[key].indexOf(target);
                    if (index > -1) {
                        environment[key].splice(index, 1);
                        inventory.push(target);
                        printText(`ACQUIRED: ${target}. ADDED TO INVENTORY.`);
                        found = true;
                        break;
                    }
                }
                if (!found) printText("ITEM NOT FOUND OR ALREADY ACQUIRED.");
            }
        } else if (action === 'INV') {
            if (inventory.length === 0) {
                printText("INVENTORY EMPTY.");
            } else {
                printText(`CURRENT INVENTORY: ${inventory.join(', ')}.`);
            }
        } else if (action === 'BOOST_SIG') {
            if (signalBoosted >= 3) {
                printText("SIGNAL AT MAXIMUM THRESHOLD. EQUIPMENT OVERHEATING.");
            } else {
                signalBoosted++;
                triangulationRisk += 30;
                
                // Increase static volume audibly
                if (staticGainNode) {
                    let newVolume = 0.01 + (signalBoosted * 0.15);
                    staticGainNode.gain.linearRampToValueAtTime(newVolume, audioCtx.currentTime + 1);
                }

                printText(`WARNING: SIGNAL BOOSTED TO LEVEL ${signalBoosted}. CLARITY SECURED.\nCONSEQUENCE: GERMAN RDF STATIONS ARE LOCKING ONTO THIS SECTOR. YOUR EXTRACTION WINDOW IS SHRINKING.`);
            }
        } else if (action === 'REQ_EXTRACT') {
            if (signalBoosted === 0) {
                printText("TRANSMISSION FAILED. STATIC INTERFERENCE TOO HIGH. HQ CANNOT HEAR YOU. CONSIDER YOUR SIGNAL STRENGTH.");
            } else if (!inventory.includes('COMPASS') || !inventory.includes('DOSSIER')) {
                printText(`HQ: "NEGATIVE ON EXTRACTION. WE NEED THE INTEL DOSSIER AND YOU NEED A COMPASS TO NAVIGATE TO THE LZ. SECURE THOSE ASSETS FIRST."`);
            } else {
                state = 'CALC_EXTRACT';
                let timeWindow = 45 - (triangulationRisk * 0.35); 
                printText(`HQ CONNECTED.\n"Assets confirmed. Listen up. Patrols are moving in. We are holding a C-47 transport at Sector Grid 70-X."\n"You are currently at Sector Grid 40-X. The distance is exactly 30 kilometers."\n"You must travel at a sprint pace of 10 kilometers per hour."\n"Due to your signal noise, we can only keep the plane waiting for ${timeWindow.toFixed(1)} hours."\n\nCALCULATE: How many hours will it take you to reach the transport?\nENTER HOURS:`);
            }
        } else {
            printText("COMMAND UNRECOGNIZED. STOP TYPING GIBBERISH AND FOCUS.");
        }
    };

    const processExtraction = (cmd) => {
        let answer = parseFloat(cmd);
        if (answer === 3) {
            let timeWindow = 45 - (triangulationRisk * 0.35);
            if (3 <= timeWindow) {
                printText("COORDINATES LOCKED. THE MATH CHECKS OUT.\nGRAB YOUR GEAR. WE WILL SEE YOU IN LONDON.\n\n*** MISSION SUCCESS ***", 40, () => {
                    inputField.style.display = 'none';
                    if(staticGainNode) staticGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3); // fade out static
                });
            } else {
                printText("THE MATH IS CORRECT, BUT YOU TOOK TOO LONG. THE PLANE LEFT.\nYOUR DECISION TO BOOST THE SIGNAL BROUGHT THE PATROLS TOO FAST.\n\n*** MISSION FAILED ***", 60, () => {
                    inputField.style.display = 'none';
                });
            }
        } else {
            printText("INCORRECT CALCULATION. IF YOU CAN'T DO MATH, YOU CAN'T BE RESCUED. TRY AGAIN:");
        }
    };

    // Init Sequence
    printText("TERMINAL POWERED ON.\nPLEASE CHOOSE YOUR PROTOCOL:\n[1] NORMAL OP (STANDARD ENCRYPTION)\n[2] TRAINING OP (ASSISTED DECRYPTION)\nENTER SELECTION:");

    inputField.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            handleInput(inputField.value);
        }
    });
</script>

</body>
</html>
