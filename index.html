<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESIDENTIAL TERMINAL - MILTON v15.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        :root {
            --phosphor: #ffb000; 
            --milton: #e8e8e8;   
            --bg: #0a0600;
            --dim: rgba(255, 176, 0, 0.3);
            --danger: #ff3300;
            --good: #4af626;
            --war: #ff4444;
            --dark: #b366ff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000; font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; padding: 2vh 2vw; overflow: hidden;
            font-size: 22px; color: var(--phosphor); letter-spacing: 1px;
        }

        .hardware-bezel {
            width: 100%; max-width: 1600px; height: 100%;
            background: #111; border-radius: 12px;
            padding: 20px 20px 90px 20px; 
            box-shadow: inset 0 0 20px #000, 0 0 50px #000;
            display: flex; flex-direction: column; position: relative;
        }

        .crt-screen {
            background: var(--bg); flex-grow: 1; border-radius: 8px;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            opacity: 0; transition: opacity 0.1s, background-color 0.5s;
        }
        .crt-screen.on { opacity: 1; }
        .crt-screen.war-mode { background: #1a0500; } 
        .crt-screen.dark-mode { background: #0d001a; } 

        .scanlines {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15));
            background-size: 100% 4px; pointer-events: none; z-index: 50;
        }
        
        .glow {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(255,176,0,0.02) 0%, rgba(0,0,0,0.3) 100%);
            pointer-events: none; z-index: 49;
        }

        .ticker-bar {
            display: flex; background: rgba(255, 176, 0, 0.08);
            border-bottom: 2px solid var(--dim); height: 35px;
            align-items: center; flex-shrink: 0; z-index: 20; position: relative;
        }
        .ticker-label {
            background: var(--phosphor); color: #000; font-weight: bold;
            padding: 0 15px; height: 100%; display: flex; align-items: center;
            z-index: 21; box-shadow: 2px 0 10px rgba(0,0,0,0.8);
        }
        .ticker-viewport { flex-grow: 1; overflow: hidden; position: relative; height: 100%; }
        .ticker-scroll {
            position: absolute; white-space: nowrap; line-height: 35px;
            animation: scroll 25s linear infinite; text-shadow: none; font-size: 20px;
        }
        @keyframes scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .system-grid {
            display: grid; grid-template-columns: 1fr 430px; 
            flex-grow: 1; position: relative; z-index: 10; overflow: hidden; 
        }

        .terminal-area {
            display: flex; flex-direction: column; padding: 20px 30px 10px 30px; 
            height: 100%; border-right: 2px solid var(--dim); cursor: text; overflow: hidden;
        }

        #artilleryCanvas {
            width: 100%; height: 250px; flex-shrink: 0;
            background: rgba(255, 68, 68, 0.05);
            border: 1px solid var(--war); border-radius: 4px;
            margin-bottom: 15px; display: none;
            box-shadow: inset 0 0 15px rgba(255, 68, 68, 0.2);
        }

        .log-output {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column;
            justify-content: flex-start; padding-bottom: 15px;
        }
        .log-output::-webkit-scrollbar { display: none; }
        .log-output { -ms-overflow-style: none; scrollbar-width: none; }

        .block { margin-bottom: 15px; line-height: 1.3; white-space: pre-wrap; text-shadow: none; }
        .block.system { opacity: 0.8; }
        .block.chief { font-weight: bold; color: var(--phosphor); border-left: 3px solid var(--phosphor); padding-left: 15px; text-shadow: 0 0 1px var(--phosphor); }
        .block.milton { color: var(--milton); font-size: 20px; border-left: 3px solid var(--milton); padding-left: 15px; text-shadow: 0 0 1px var(--milton); opacity: 0.95; }
        .block.danger { color: var(--danger); text-shadow: 0 0 2px var(--danger); font-weight: bold; }
        .block.general { color: var(--war); text-shadow: 0 0 2px var(--war); border-left: 3px solid var(--war); padding-left: 15px; font-weight: bold; }
        .block.dark { color: var(--dark); text-shadow: 0 0 2px var(--dark); border-left: 3px solid var(--dark); padding-left: 15px; font-weight: bold; }
        .block.user-echo { font-weight: bold; opacity: 0.9; }

        .input-line {
            display: flex; align-items: center; margin-top: auto;
            flex-shrink: 0; display: none; padding-bottom: 8px; font-size: 24px;
        }
        .prompt { margin-right: 10px; font-weight: bold; text-shadow: none; }
        #visualInput { white-space: pre; text-transform: lowercase; text-shadow: none; }
        .cursor {
            display: inline-block; width: 14px; height: 24px; background: var(--phosphor); 
            animation: blink 1s step-end infinite; margin-left: 2px; vertical-align: text-bottom; box-shadow: 0 0 2px var(--phosphor);
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #cmd { position: absolute; opacity: 0; left: -9999px; top: -9999px; pointer-events: none; }

        .dashboard-area {
            padding: 20px; display: flex; flex-direction: column; gap: 12px; 
            background: rgba(10, 6, 0, 0.4); cursor: default; height: 100%; overflow: hidden; 
        }

        .panel {
            border: 2px solid var(--phosphor); padding: 10px 15px;
            box-shadow: inset 0 0 10px var(--dim); transition: border-color 0.3s; flex-shrink: 0; 
        }
        .panel.war-mode { border-color: var(--war); box-shadow: inset 0 0 20px rgba(255, 68, 68, 0.2); }
        .panel.dark-mode { border-color: var(--dark); box-shadow: inset 0 0 20px rgba(179, 102, 255, 0.2); }

        .panel-title { text-align: center; border-bottom: 2px solid var(--dim); padding-bottom: 5px; margin-bottom: 8px; letter-spacing: 2px; font-weight: bold; text-shadow: 0 0 1px currentColor; }
        .metric-header { display: grid; grid-template-columns: 1fr 80px 80px; font-size: 16px; opacity: 0.6; margin-bottom: 5px; text-align: right; border-bottom: 1px solid var(--dim); padding-bottom: 2px; }
        .mh-label { text-align: left; }
        
        .metric-row { display: grid; grid-template-columns: 1fr 80px 80px; align-items: center; margin-bottom: 6px; cursor: help; }
        .metric-row:hover { background: var(--dim); }
        .metric-label { opacity: 0.8; text-shadow: none; }
        .metric-value { font-weight: bold; text-shadow: none; text-align: right; transition: color 0.3s;}
        .metric-target { opacity: 0.5; text-shadow: none; color: var(--phosphor); text-align: right; font-size: 20px; }

        .metric-value.warning { color: var(--danger); text-shadow: 0 0 2px var(--danger); }
        .metric-value.good { color: var(--good); text-shadow: 0 0 2px var(--good); }
        .metric-value.warning + .metric-target { color: var(--danger); opacity: 0.7; }
        .metric-value.good + .metric-target { color: var(--good); opacity: 0.7; }

        .dict-box {
            flex-grow: 1; border: 1px solid var(--dim); padding: 15px; font-size: 18px; line-height: 1.3; 
            background: rgba(255, 176, 0, 0.05); display: flex; flex-direction: column; overflow-y: auto; min-height: 80px; 
            text-shadow: none; transition: all 0.3s;
        }
        .dict-box::-webkit-scrollbar { display: none; }
        .context-title { font-weight: bold; font-size: 20px; margin-bottom: 6px; border-bottom: 1px solid var(--phosphor); padding-bottom: 4px; flex-shrink: 0; transition: color 0.3s, border-color 0.3s;}
        .context-def { margin-bottom: 8px; }
        .context-hist { font-style: italic; opacity: 0.9; border-left: 2px solid var(--phosphor); padding-left: 10px; color: var(--milton); }

        .cmd-list { flex-shrink: 0; font-size: 18px; opacity: 0.9; border-top: 2px dashed var(--dim); padding-top: 10px; padding-bottom: 5px; text-shadow: none; }
        .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
        .cmd-item { font-size: 18px; }
        .cmd-item.highlight { border: 1px solid var(--milton); color: var(--milton); padding: 2px 4px; border-radius: 3px; text-align: center; margin-bottom: 8px;}
        .cmd-item.war-highlight { border: 1px solid var(--war); color: var(--war); text-align: center;}
        .cmd-item.dark-highlight { border: 1px solid var(--dark); color: var(--dark); text-align: center;}

        .hardware-controls { position: absolute; bottom: 22px; right: 35px; display: flex; gap: 25px; z-index: 100; }
        .hw-btn {
            width: 48px; height: 48px; background: #2a2a2a; border: 2px solid #000; border-radius: 50%;
            cursor: pointer; box-shadow: 0 4px 0 #000, inset 0 2px 5px rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; color: #111; 
            font-family: sans-serif; text-shadow: 1px 1px 0 rgba(255,255,255,0.15); transition: all 0.1s; position: relative;
        }
        .hw-btn:hover { background: #333; }
        .hw-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #000, inset 0 2px 5px rgba(255,255,255,0.1); }
        .hw-icon { font-size: 20px; } .hw-icon.power { font-size: 24px; }
        
        .hw-led { width: 9px; height: 9px; border-radius: 50%; position: absolute; top: -17px; left: 18px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8); }
        .hw-led.amber { background: #331a00; } .hw-led.amber.on { background: #ffaa00; box-shadow: 0 0 10px #ffaa00, inset 0 1px 2px rgba(255,255,255,0.5); }
        .hw-led.green { background: #003300; } .hw-led.green.on { background: #4af626; box-shadow: 0 0 10px #4af626, inset 0 1px 2px rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div class="hardware-bezel">
        <div class="crt-screen" id="screen">
            <div class="scanlines"></div><div class="glow"></div>
            
            <div class="ticker-bar" id="tickerBar" style="visibility:hidden;">
                <div class="ticker-label">NEWSWIRE</div>
                <div class="ticker-viewport">
                    <div class="ticker-scroll" id="tickerContent">AWAITING SYSTEM BOOT...</div>
                </div>
            </div>

            <div class="system-grid">
                <div class="terminal-area" onclick="focusTerminal()">
                    <canvas id="artilleryCanvas"></canvas>
                    <div class="log-output" id="logOutput"></div>
                    <div class="input-line" id="inputLine">
                        <span class="prompt" id="promptText">POTUS:~$</span>
                        <span id="visualInput"></span><div class="cursor" id="cursorIndicator"></div>
                        <input type="text" id="cmd" autocomplete="off" spellcheck="false" maxlength="60">
                    </div>
                </div>

                <div class="dashboard-area" id="dashboardArea" style="visibility:hidden;">
                    <div class="panel" id="telemetryPanel"></div>
                    <div class="dict-box" id="dictBox">
                        <div class="context-title" id="dictTitle">INTELLIGENCE</div>
                        <div class="context-def" id="dictDef">Hover over metrics to access structural definitions and precedents.</div>
                        <div class="context-hist" id="dictHist" style="display:none;"></div>
                    </div>
                    <div class="cmd-list" id="cmdListArea"></div>
                </div>
            </div>
        </div>

        <div class="hardware-controls">
            <div class="hw-btn" onclick="toggleSound()" title="TOGGLE SOUND">
                <div class="hw-led green on" id="soundLed"></div><div class="hw-icon">🔊</div>
            </div>
            <div class="hw-btn" onclick="togglePower()" title="POWER">
                <div class="hw-led amber" id="powerLed"></div><div class="hw-icon power">⏻</div>
            </div>
        </div>
    </div>

    <script>
        // --- CORE STATE ---
        const state = {
            isOn: false, soundEnabled: true,
            mode: 'macro', subMode: null, turn: 1, maxTurns: 12, monthsToElection: 48,
            gdp: 2.1, unemployment: 5.1, inflation: 4.8, approval: 48, fedCredibility: 80, sp500: 4800, congress: 55, tariffRate: 5.0,
            hasPriceControls: false, currentCrisis: '', miltonAskedThisTurn: false,
            warTurnTrigger: 99, 
            war: { enemyStrength: 100, tension: 50, casualties: 0, expenditure: 0 },
            dark: { narrative: 45, compliance: 50, paranoia: 25, trust: 75 },
            newsQueue: [], futureNews: [],
            previousState: null // NEW: Track state changes between turns
        };

        const DOM = {
            screen: document.getElementById('screen'), pLed: document.getElementById('powerLed'), sLed: document.getElementById('soundLed'),
            log: document.getElementById('logOutput'), inputLine: document.getElementById('inputLine'), cmd: document.getElementById('cmd'),
            visInput: document.getElementById('visualInput'), dash: document.getElementById('dashboardArea'),
            telemetry: document.getElementById('telemetryPanel'), cmdList: document.getElementById('cmdListArea'),
            dict: document.getElementById('dictBox'), dictTitle: document.getElementById('dictTitle'), dictDef: document.getElementById('dictDef'), dictHist: document.getElementById('dictHist'),
            prompt: document.getElementById('promptText'), tickerBar: document.getElementById('tickerBar'), tickerContent: document.getElementById('tickerContent'),
            canvas: document.getElementById('artilleryCanvas')
        };

        // --- DYNAMIC ADVISOR COMMENTARY SYSTEM ---
        const advisorComments = {
            milton: {
                inflation: [
                    { threshold: 8.0, text: "MILTON: Inflation above 8%? You're in dangerous territory. This is the kind of hyperinflation that destroys savings and creates black markets." },
                    { threshold: 6.0, text: "MILTON: Inflation above 6%. This isn't transitory—it's structural. Every day you delay action, you erode purchasing power further." },
                    { threshold: 4.5, text: "MILTON: Inflation at 4.5%? Not good, but not catastrophic yet. The Fed still has credibility to contain it." },
                    { threshold: 3.0, text: "MILTON: Inflation under control at 3%. Good. But don't let your guard down—complacency creates inflationary momentum." },
                    { threshold: 2.5, text: "MILTON: Inflation near target at 2.5%. Sound money is working. Maintain this discipline and you'll have markets as allies." }
                ],
                unemployment: [
                    { threshold: 8.0, text: "MILTON: Unemployment above 8%? That's a social crisis disguised as an economic statistic. People don't starve in theory—they starve in reality." },
                    { threshold: 6.5, text: "MILTON: Unemployment at 6.5%. The natural rate has expanded. Labor markets are tightening, but not fast enough." },
                    { threshold: 5.0, text: "MILTON: Unemployment at 5%. The natural rate. When labor moves to where it's needed most, productivity increases organically." },
                    { threshold: 4.0, text: "MILTON: Unemployment below 4%? You're in full employment territory. Wages will rise, but be careful about triggering inflationary expectations." }
                ],
                gdp: [
                    { threshold: -2.0, text: "MILTON: GDP growth below -2%? That's a recession. The market is clearing malinvestment. Don't try to fight it with printed money." },
                    { threshold: 1.5, text: "MILTON: GDP growth at 1.5%. Stagnant. You're not growing, you're just maintaining. Structural reforms are needed, not stimulus." },
                    { threshold: 3.0, text: "MILTON: GDP growth above 3%? That's expansion territory. But if it's debt-fueled, it's unsustainable expansion." },
                    { threshold: 4.5, text: "MILTON: GDP growth above 4.5%? Either you're in a boom or a bubble. The market tells us which one by looking at asset prices." }
                ],
                sp500: [
                    { threshold: 3000, text: "MILTON: S&P below 3000? Markets are pricing in despair. Opportunity for the brave, catastrophe for the panicked." },
                    { threshold: 4000, text: "MILTON: S&P at 4000. Fear is receding, but caution remains. Don't mistake liquidity-driven rallies for fundamental strength." },
                    { threshold: 5200, text: "MILTON: S&P above 5200? Markets are pricing in perfection. Be careful—perfection rarely lasts when monetary discipline falters." }
                ],
                policies: {
                    priceControls: "MILTON: Price controls are the economic equivalent of putting a band-aid on a severed artery. You're not fixing the cause—you're just hiding it until the shockwave hits.",
                    stimulus: "MILTON: Stimulus is like heroin for economies—effective in the short term, devastating in the long run. The withdrawal symptoms always come.",
                    quantitativeEasing: "MILTON: Quantitative Easing. A polite term for printing money to buy your own debt. Asset holders rejoice, the working class pays the inflation tax.",
                    tariffs: "MILTON: Tariffs are taxes on your own citizens disguised as protection for industry. You're not making America great—you're just making Americans poorer."
                },
                combinations: [
                    { condition: (s) => s.inflation > 5 && s.unemployment > 6, text: "MILTON: Stagflation—high inflation and high unemployment. This is the nightmare scenario I warned about in the 70s. No easy solution exists." },
                    { condition: (s) => s.approval < 40 && s.inflation > 5, text: "MILTON: Approval below 40% with inflation above 5%? You're in the perfect storm for electoral defeat. Economic pain is personal politics." },
                    { condition: (s) => s.sp500 > 5000 && s.approval < 45, text: "MILTON: Markets are booming but you're unpopular? Classic bubble scenario. The wealthy celebrate while the electorate votes in anger." }
                ]
            },
            chief: {
                approval: [
                    { threshold: 60, text: "CHIEF OF STAFF: Approval above 60%? You're a political unicorn. Every pollster would sell their grandmother for these numbers." },
                    { threshold: 51, text: "CHIEF OF STAFF: Approval at 51%. You're in the safe zone, but don't get comfortable. Voters forget promises faster than you make them." },
                    { threshold: 45, text: "CHIEF OF STAFF: Approval at 45%? The media is starting to circle. We need a narrative win before they write your obituary." },
                    { threshold: 38, text: "CHIEF OF STAFF: Approval below 38%? You're in the danger zone. We'll have primary challenges by Thanksgiving unless something changes." }
                ],
                congress: [
                    { threshold: 70, text: "CHIEF OF STAFF: Congress at 70% approval? legislative gridlock is impossible with support like that. What's your next win?" },
                    { threshold: 51, text: "CHIEF OF STAFF: Congress at 51%? We can push through major legislation if we time it right." },
                    { threshold: 30, text: "CHIEF OF STAFF: Congress approval below 30%? They're looking for a sacrifice to save their own skins. Don't be the fall guy." }
                ],
                election: [
                    { threshold: 12, text: "CHIEF OF STAFF: Only 12 months until election? Time is no longer your ally—it's the opposition's best weapon." },
                    { threshold: 6, text: "CHIEF OF STAFF: Six months to go. The window for meaningful policy is closing. What's your exit strategy?" }
                ],
                crisis: {
                    approvalDrop: "CHIEF OF STAFF: We need optics, not economics. The market will heal itself—voters won't wait around for theory to prove me wrong.",
                    inflation: "CHIEF OF STAFF: Groceries are up 12%? That's not an economic statistic—that's a voting statistic. We need visible action yesterday."
                }
            },
            general: {
                warProgress: [
                    { threshold: 75, text: "GENERAL: Enemy strength below 25%? They're broken but not defeated. Push forward before they regroup." },
                    { threshold: 50, text: "GENERAL: Enemy at 50% strength? We've gained ground but face stiffening resistance. This is where wars become quagmires." },
                    { threshold: 25, text: "GENERAL: Enemy strength above 75%? They're still dangerous. Pushing forward now would be reckless." }
                ],
                casualties: [
                    { threshold: 500, text: "GENERAL: Casualties over 500? The home front won't tolerate this for long. We need a clear victory narrative fast." },
                    { threshold: 200, text: "GENERAL: Casualties at 200. Acceptable losses in a winning campaign. But the electorate's patience is finite." }
                ]
            },
            shadow: {
                narrative: [
                    { threshold: 85, text: "CHIEF OF STAFF: Narrative control above 85%? The media cycle is locked tight. We can weather almost any scandal now." },
                    { threshold: 60, text: "CHIEF OF STAFF: Narrative at 60%? We've got the mainstream talking points but alternative channels are noisy." },
                    { threshold: 40, text: "CHIEF OF STAFF: Narrative below 40%? The information ecosystem is fracturing. This is how conspiracies take root." }
                ],
                compliance: [
                    { threshold: 80, text: "CHIEF OF STAFF: Press compliance above 80%? They're repeat customers now. Tell them what to say and watch it run." },
                    { threshold: 50, text: "CHIEF OF STAFF: Compliance at 50%? We've got most outlets on the leash but some outliers are getting vocal." }
                ]
            }
        };

        // --- CRISIS SCENARIOS (Chief Manipulation vs Milton Reality) ---
        const crisisProfiles = {
            'inflation': { 
                chief: "CHIEF OF STAFF: Sir, groceries are up 12%. The base is getting crushed and the media is running 24/7 segments on 'Greedflation.' I strongly advise PRICE CONTROLS [pc]. Think of the second-order effect: we cap the prices, the media praises us for fighting corporate monopolies, and our polling rebounds instantly.", 
                milton: "MILTON: The Chief is confusing optics with economics. If you cap prices below the market clearing rate, producers will simply stop producing. You aren't eliminating the cost, you are converting it into a time-cost via breadlines and black markets. You'll get your positive headline today, and nationwide supply chain failure next month. Restrict the money supply [rr] or [cs]." 
            },
            'unemployment': { 
                chief: "CHIEF OF STAFF: The rust belt is bleeding jobs and union leaders are threatening a general strike. Authorize MASSIVE STIMULUS [ms] or slap TARIFFS [ta] on imports. The downstream effect is vital: we save the factories, the local economies stay afloat, and we lock in the blue-collar vote for a generation. It's an investment in political capital.", 
                milton: "MILTON: An 'investment' paid for with stolen purchasing power. Tariffs don't protect workers; they subsidize inefficient domestic monopolies by placing a hidden sales tax on 300 million citizens. Stimulus is just taking water from the deep end of the pool and pouring it into the shallow end. Deregulate [dr] and let dead capital reallocate organically." 
            },
            'market_crash': { 
                chief: "CHIEF OF STAFF: The S&P is in freefall! Our mega-donors are getting margin-called and freezing campaign accounts. Demand the Fed execute QUANTITATIVE EASING [qe] or CUT RATES [cr] immediately! The wealth effect is real—if 401ks recover, consumer confidence bounces back, and the donor class opens their checkbooks again.", 
                milton: "MILTON: The Chief is advocating for the privatization of profits and the socialization of losses. Wall Street took leveraged risks, and now they are holding a gun to the economy's head demanding a bailout. If you print money [qe] to save their equity, you generate profound moral hazard. They will never learn risk management. Let them burn [dn]." 
            },
            'approval_drop': { 
                chief: "CHIEF OF STAFF: We are sub-40%. We're in lame-duck territory, sir. We need to buy back the public's affection. INCREASE SPENDING [is] on direct subsidies. It's immediate liquidity in their pockets. The second-order effect is a massive spike in consumer spending, which will juice the GDP right before they hit the ballot box.", 
                milton: "MILTON: You are attempting to bribe the electorate with their own grandchildren's money. The 'spending multiplier' is a myth designed to justify bureaucratic expansion. Every dollar you spend is a dollar extracted from the private sector via taxes or debt. You are cannibalizing tomorrow's structural growth for today's polling bump." 
            },
            'geopolitical': { 
                chief: "CHIEF OF STAFF: The Strait of Hormuz is blockaded. We look incredibly weak on the global stage. If we DEPLOY MILITARY [dm], we project strength. Wars unite the country—it's the classic rally-around-the-flag effect. Defense contractors get paid, unemployment drops as we ramp up production, and you look like a wartime President.", 
                milton: "MILTON: The broken window fallacy on a global scale. Yes, building bombs employs people, but those bombs generate zero structural value—they are built exclusively to be destroyed. War is the ultimate engine of capital destruction and inflation. Negotiating [ng] hurts your political pride, but kinetic action bankrupts the treasury." 
            },
            'stable': { 
                chief: "CHIEF OF STAFF: The metrics are fine, but 'fine' doesn't motivate voters. We need a narrative. Let's pass a STIMULUS [ms] or announce a new spending project [is]. It shows we are 'building the future.' The downstream effect is pure momentum going into November. We can't afford to just sit here looking idle.", 
                milton: "MILTON: The hardest discipline for a politician is knowing when to do absolutely nothing. The system is currently clearing its own ledgers. The Chief wants you to inject artificial volatility into a stable system just to generate campaign footage. Resist the urge to meddle. [dn]" 
            }
        };

        // --- AUDIO ENGINE ---
        let audioCtx; let clickBuffer; let humOscillator;

        function initAudio() {
            if (audioCtx) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return;
            }
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                const bufferSize = audioCtx.sampleRate * 0.05; 
                clickBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = clickBuffer.getChannelData(0);

            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.3);

                osc.type = isDark ? 'square' : 'sine';
                osc.frequency.setValueAtTime(isDark ? 600 : 1200, time);
                osc.frequency.exponentialRampToValueAtTime(isDark ? 400 : 800, time + 0.1);
                gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.4, time + 0.02); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(time); osc.stop(time + 0.15);

            playPing(t); playPing(t + 0.12);

        function getAdvisorComment(advisor, metricName, value) {
            if (!advisorComments[advisor] || !advisorComments[advisor][metricName]) return null;

            for (const comment of comments) {

            }

            if (!state.isOn || state.mode !== 'macro') return;
            
            const newComments = [];
            
            // Check metric thresholds for Milton
            if (state.inflation > 2) {
                const inflationComment = getAdvisorComment('milton', 'inflation', state.inflation);
                if (inflationComment && !newComments.includes(inflationComment)) newComments.push(inflationComment);
            }
            
            if (state.unemployment > 3) {
                const unemploymentComment = getAdvisorComment('milton', 'unemployment', state.unemployment);
                if (unemploymentComment && !newComments.includes(unemploymentComment)) newComments.push(unemploymentComment);
            }
            
            if (state.gdp < 5) {

            // Check S&P 500
            const spComment = getAdvisorComment('milton', 'sp500', state.sp500);
            if (spComment && !newComments.includes(spComment)) newComments.push(spComment);
            
            // Check approval rating
            const approvalComment = getAdvisorComment('chief', 'approval', state.approval);
            if (approvalComment && !newComments.includes(approvalComment)) newComments.push(approvalComment);
            
            // Check congressional support
            const congressComment = getAdvisorComment('chief', 'congress', state.congress);
            if (congressComment && !newComments.includes(congressComment)) newComments.push(congressComment);
            
            // Check election countdown
            const electionComment = getAdvisorComment('chief', 'election', state.monthsToElection);
            if (electionComment && !newComments.includes(electionComment)) newComments.push(electionComment);
            
            // Check for dangerous combinations
            const combinationComments = checkCombinations(state);
            newComments.push(...combinationComments);
            
            // Print unique comments in reverse order (newest first)
            if (newComments.length > 0) {
                print("--------------------------------------------------", 'system');
                [...newComments].reverse().forEach(comment => {

        // --- NEW: Function to compare state changes ---
        function analyzeStateChanges() {
            if (!state.previousState) return;
            
            const changes = [];
            
            // GDP change
            const gdpChange = state.gdp - state.previousState.gdp;
            if (Math.abs(gdpChange) > 0.3) {
                changes.push(`GDP ${gdpChange > 0 ? 'rose' : 'fell'} by ${Math.abs(gdpChange).toFixed(1)}% to ${state.gdp.toFixed(1)}%`);
            }
            
            // Inflation change
            const infChange = state.inflation - state.previousState.inflation;
            if (Math.abs(infChange) > 0.3) {
                changes.push(`Inflation ${infChange > 0 ? 'rose' : 'fell'} by ${Math.abs(infChange).toFixed(1)}% to ${state.inflation.toFixed(1)}%`);
            }
            
            // Unemployment change
            const unempChange = state.unemployment - state.previousState.unemployment;
            if (Math.abs(unempChange) > 0.3) {
                changes.push(`Unemployment ${unempChange > 0 ? 'rose' : 'fell'} by ${Math.abs(unempChange).toFixed(1)}% to ${state.unemployment.toFixed(1)}%`);
            }
            
            // Approval change
            const appChange = state.approval - state.previousState.approval;
            if (Math.abs(appChange) > 3) {
                changes.push(`Approval rating ${appChange > 0 ? 'rose' : 'fell'} by ${Math.abs(appChange)}% to ${state.approval}%`);
            }

                print("--------------------------------------------------", 'system');
                changes.forEach(change => print(`SYSTEM: ${change}`, 'system'));
            }
        }

                print("TUTORIAL:\nYour Chief of Staff advises on political optics. They will try to manipulate you to ensure your survival.\nType [am] to ASK MILTON to deconstruct their logic.\nAchieve the Targets in the [TARGET] column to stabilize.\nChain directives using commas (e.g., rr, cs, ta).");
                print("--------------------------------------------------\n");
                DOM.dash.style.visibility = 'visible'; 
                processTicker(); updateDashboard(); runTurn();
            }, 800);
        }

        function triggerWarMode() {
            state.mode = 'war'; state.war.active = true; state.war.enemyStrength = 100; state.war.tension = 50; state.war.casualties = 0; state.war.expenditure = 0;
            playBell(false); print("\nWARNING: KINETIC ACTION AUTHORIZED.", 'danger'); print("GENERAL: We are locked and loaded, sir. Give us the targets. Reduce Enemy Strength to 0. Watch the tension gauge—if it hits 100%, they launch the nukes and it's game over.", 'general');
            updateDashboard(); setTimeout(updateDashboard, 100);
        }

        function triggerDarkMode() {
            state.mode = 'dark'; playBell(true);
            print("\nWARNING: SHADOW PROTOCOLS ENGAGED.", 'dark'); print("CHIEF OF STAFF: Welcome to the spin room, sir. Optics are reality. Let's manufacture some consent.", 'chief');
            updateDashboard(); setTimeout(updateDashboard, 100);
        }

        function endWar(victory) {
            state.mode = 'macro'; state.war.active = false; state.subMode = null; DOM.canvas.style.display = 'none';
            if(artLoopId) cancelAnimationFrame(artLoopId);

            print("\nTHEATER COMMAND DISENGAGED. Total Expenditure: $"+state.war.expenditure+" Billion.", 'system');
            if (victory) { print("GENERAL: Enemy surrender confirmed. Total victory.", 'general'); state.approval += 25; queueNews("[GLOBAL] Hostilities conclude with decisive American victory.", 0); } 
            else { print("GENERAL: Withdrawal complete. We are tucking tail.", 'general'); state.approval -= 20; queueNews("[GLOBAL] Forces withdraw. Administration facing harsh criticism.", 0); }
            
            print(`MILTON: The war is over. Time to pay the bill. This deficit spending will now hit the macro economy.`, 'milton');
            let infHit = (state.war.expenditure / 10); let gdpHit = (state.war.expenditure / 20);
            state.inflation += infHit; state.gdp -= gdpHit;
            
            updateDashboard(); processTicker(); setTimeout(advanceTimeline, 1000);
        }

        function endDarkOps() {
            state.mode = 'macro'; print("\nSHADOW PROTOCOLS DISENGAGED.", 'system');
            print("MILTON: Welcome back to reality, Mr. President. I hope the manipulation was worth the institutional decay. The market will now react to your fractured societal trust.", 'milton');
            if (state.dark.paranoia > 70) { state.gdp -= 2.0; print("SYSTEM: High public paranoia severely hampering economic investment.", 'danger'); queueNews("[MARKETS] Investment stalls amid unprecedented civil paranoia.", 0); }
            if (state.dark.trust < 40) { state.fedCredibility -= 20; state.congress -= 15; print("SYSTEM: Institutional collapse eroding Federal credibility.", 'danger'); queueNews("[ECONOMY] Global faith in US institutions faltering.", 0); }
            updateDashboard(); processTicker(); setTimeout(advanceTimeline, 1000);
        }

        function determineCrisis() {
            if (state.turn === state.warTurnTrigger) return 'geopolitical'; 
            if (state.inflation > 4.5) return 'inflation';
            if (state.unemployment > 6.0) return 'unemployment';
            if (state.sp500 < 4500) return 'market_crash';
            if (state.approval < 45) return 'approval_drop';
            return 'stable';
        }

        function runTurn() {
            if (state.mode !== 'macro') return; 
            
            applyRandomShock();

            state.miltonAskedThisTurn = false; state.currentCrisis = determineCrisis();
            updateDashboard(); print("\n--------------------------------------------------");
            
            if (state.currentCrisis === 'geopolitical') { playBell(false); print("SYSTEM: GLOBAL OIL SHOCK. STRAIT OF HORMUZ BLOCKADED.", 'danger'); queueNews("[BREAKING] Strait of Hormuz blocked. Energy markets in panic.", 0); processTicker(); }
            
            print(crisisProfiles[state.currentCrisis].chief, 'chief');
            enableInput();
        }

        function advanceTimeline() {
            // Store previous state for comparison
            if (state.turn > 1) {
                state.previousState = {
                    gdp: parseFloat((state.gdp * 10).toFixed(1)/10),
                    unemployment: parseFloat((state.unemployment * 10).toFixed(1)/10),
                    inflation: parseFloat((state.inflation * 10).toFixed(1)/10),
                    approval: Math.round(state.approval),
                    sp500: state.sp500
                };
            }
            
            state.turn++; state.monthsToElection -= 4;
            
            if (state.inflation <= 2.5 && state.unemployment <= 5.0 && state.mode === 'macro') {
                state.gdp += 0.2; print("MILTON: Sound money and stable prices are working. The market is generating organic capital without interference.", 'milton');
            }

            if (state.mode === 'macro') {
                if (state.dark.trust < 75) state.dark.trust += 1;
                if (state.dark.paranoia > 25) state.dark.paranoia -= 1;
            }

            processTicker();
            
            // Evaluate advisor comments and state changes
            evaluateAdvisorComments();
            analyzeStateChanges();

            if (state.monthsToElection <= 0) {
                print("\n--- ELECTION DAY ---", 'system');
                if (state.inflation > 5 || state.unemployment > 8) { print("CHIEF OF STAFF: It's a blowout. The voters blamed us for the economy. We lost.", 'chief'); print("MILTON: As expected. You ignored the monetary fundamentals.", 'milton'); } 
                else if (state.approval < 50) { print("CHIEF OF STAFF: We lost re-election. The political optics were just too terrible to overcome.", 'chief'); print("MILTON: True, but you took the necessary short-term hits and set up the foundation for the future.", 'milton'); } 
                else { print("CHIEF OF STAFF: WE WON! Four more years!", ' chief'); print("MILTON: Congratulations, Mr. President. A rare victory for structural restraint.", 'milton'); }
                print("\nSYSTEM: SIMULATION CONCLUDED. TYPE 'RESET' TO RESTART.", 'system');
                enableInput(); return;
            }
            
            if (state.mode === 'macro') setTimeout(runTurn, 500); else enableInput();
        }

        // --- ARTILLERY SUB-MODULE ---
        let artCtx; let artLoopId;
        const artState = { pX: 30, groundY: 220, targetX: 0, proj: null };

        function initArtilleryMode() {
            state.subMode = 'artillery'; DOM.canvas.style.display = 'block';
            
            // --- FIXED: Use fixed dimensions instead of clientWidth ---
            DOM.canvas.width = 600;
            DOM.canvas.height = 250;
            
            artCtx = DOM.canvas.getContext('2d');
            let safeW = DOM.canvas.width;
            artState.targetX = Math.max(150, Math.min(safeW - 100, Math.random() * (safeW - 250) + 150));
            updateDashboard(); drawArtilleryBase();
            print("SYSTEM: ARTILLERY TARGETING ACTIVE. INPUT ANGLE AND YIELD (e.g., 45, 80).", 'danger');
            setTimeout(enableInput, 100); 
        }

        function drawArtilleryBase() {
            if (!artCtx) return;
            artCtx.clearRect(0,0, DOM.canvas.width, DOM.canvas.height);
            artCtx.strokeStyle = 'rgba(255,176,0,0.5)'; artCtx.beginPath(); artCtx.moveTo(0, artState.groundY); artCtx.lineTo(DOM.canvas.width, artState.groundY); artCtx.stroke();
            artCtx.fillStyle = '#4af626'; artCtx.fillRect(artState.pX, artState.groundY - 15, 20, 15);
            artCtx.fillStyle = '#ff4444'; artCtx.fillRect(artState.targetX, artState.groundY - 15, 30, 15);
            artCtx.fillStyle = 'rgba(255,255,255,0.4)'; artCtx.fillRect(artState.targetX + 60, artState.groundY - 25, 40, 25); artCtx.fillRect(artState.targetX + 105, artState.groundY - 15, 20, 15);
        }

        function fireArtillery(angle, pYield) {
            playLaunch(); state.war.expenditure += 15; document.getElementById('dashExpenditure').textContent = `$${state.war.expenditure}B`;
            print("[WAR EXPENDITURE DEBITED: $15 BILLION]", 'danger');
            const v = pYield * 0.25; const rad = angle * Math.PI / 180;
            artState.proj = { x: artState.pX + 10, y: artState.groundY - 15, vx: v * Math.cos(rad), vy: v * Math.sin(rad), active: true, isPlayer: true };
            animateProjectile();
        }

        function animateProjectile() {
            if (!artCtx || !artState.proj.active) return;
            artState.proj.x += artState.proj.vx; artState.proj.y -= artState.proj.vy; artState.proj.vy -= 0.5; 
            drawArtilleryBase();
            artCtx.fillStyle = artState.proj.isPlayer ? '#ffb000' : '#ff4444';
            artCtx.beginPath(); artCtx.arc(artState.proj.x, artState.proj.y, 3, 0, Math.PI*2); artCtx.fill();

            if (artState.proj.y >= artState.groundY) { artState.proj.active = false; handleImpact(); } 
            else { artLoopId = requestAnimationFrame(animateProjectile); }
        }

        function handleImpact() {
            playExplosion(); if (!artCtx) return;
            artCtx.fillStyle = '#ffb000'; artCtx.beginPath(); artCtx.arc(artState.proj.x, artState.groundY, 20, 0, Math.PI*2); artCtx.fill();
            
            if (artState.proj.isPlayer) {
                let dist = Math.abs(artState.proj.x - (artState.targetX + 15));
                if (dist < 25) { print("GENERAL: DIRECT HIT! Target neutralized.", 'good'); state.war.enemyStrength -= 30; } 
                else if (artState.proj.x > artState.targetX + 50) {
                    print("GENERAL: OVERSHOOT. Ordnance impacted civilian sector.", 'danger'); print("MILTON: Congratulations, you just spent $15 Billion to blow up a hospital. The electorate is furious.", 'milton');
                    state.approval -= 4; state.war.tension += 15; queueNews("[GLOBAL] International outrage over collateral damage in recent strike.", 0); processTicker();
                } else { print("GENERAL: MISS. Ordnance fell short.", 'danger'); print("MILTON: You just burned $15 Billion to rearrange some sand, Mr. President. That deficit spending will hit the inflation gauge.", 'milton'); }

                updateDashboard();
                if (state.war.enemyStrength <= 0) { setTimeout(()=>endWar(true), 1500); return; }
                setTimeout(enemyFire, 1000);
            } else {
                let dist = Math.abs(artState.proj.x - (artState.pX + 10));
                if (dist < 30) {
                    print("GENERAL: BASE HIT! We are taking casualties!", 'danger'); print("MILTON: Taking fire. The electorate's stomach for these body bags is finite.", 'milton');
                    state.war.casualties += Math.floor(Math.random()*40 + 20); state.approval -= 3;
                } else { print("GENERAL: Enemy fire missed our position.", 'system'); }
                updateDashboard();
                if (state.war.tension >= 100) { playAlarm(true); setTimeout(() => { DOM.screen.style.backgroundColor = '#fff'; DOM.screen.innerHTML = '<div style="color:black; background:white; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:50px; font-weight:bold;">MUTUALLY ASSURED DESTRUCTION</div>'; }, 1000); return; }
                if (state.approval <= 15) { print("SYSTEM: WAR PROTESTS OVERWHELM CAPITAL. CONGRESS VOTES IMPEACHMENT.", 'danger'); return; }
                setTimeout(enableInput, 500);
            }
        }

        function enemyFire() {
            print("GENERAL: INCOMING! Enemy has acquired firing solution.", 'danger'); playLaunch();
            const d = (artState.targetX + 15) - (artState.pX + 10);
            let vReq = Math.sqrt(d * 0.5); vReq += (Math.random() - 0.5) * 5; 
            const rad = 135 * Math.PI / 180; 
            artState.proj = { x: artState.targetX, y: artState.groundY - 15, vx: vReq * Math.cos(rad), vy: vReq * Math.sin(rad), active: true, isPlayer: false };
            animateProjectile();
        }

        // --- MAIN INPUT PARSER ---
        function processInput() {
            let rawVal = DOM.cmd.value.trim().toLowerCase(); DOM.cmd.value = ''; DOM.visInput.textContent = '';
            if (!rawVal) return;
            DOM.inputLine.style.display = 'none'; DOM.cmd.disabled = true;

            if (rawVal === 'reset' || rawVal === 'rst') { location.reload(); return; }
            if (state.monthsToElection <= 0) { print("SYSTEM: SIMULATION OVER. TYPE 'RESET' TO RESTART.", 'danger'); enableInput(); return; }

            if (state.subMode === 'artillery') {
                if (rawVal === 'wd' || rawVal === 'withdraw') {
                    if (artLoopId) cancelAnimationFrame(artLoopId);
                    state.subMode = null; DOM.canvas.style.display = 'none'; updateDashboard();
                    print("GENERAL: Artillery mission aborted.", 'system'); enableInput(); return;
                }
                
                let parts = rawVal.replace(/,/g, ' ').split(/\s+/).filter(t => t !== '');
                let angle = parseFloat(parts[0]); let pYield = parseFloat(parts[1]);
                if (isNaN(angle) || isNaN(pYield) || angle < 0 || angle > 90 || pYield < 1 || pYield > 100 || parts.length < 2) {
                    print("SYSTEM: INVALID SOLUTION. FORMAT: ANGLE, YIELD (e.g. 45, 80)", 'danger'); enableInput(); return;
                }
                print(`SOLUTION:~$ ${angle}, ${pYield}`, 'user-echo');
                fireArtillery(angle, pYield); return;
            }

            if (rawVal === 'am' || rawVal === 'ask milton') {
                print(`${state.mode === 'war' ? 'COMMAND:~$' : (state.mode === 'dark' ? 'SHADOW:~$' : 'POTUS:~$')} ${rawVal}`, 'user-echo');
                if (state.mode === 'war') print("MILTON: Every airstrike is a hospital that won't be built. Every ground operation is a massive expansion of the state. Do not bankrupt the country for a sandbox war.", 'milton');
                else if (state.mode === 'dark') print("MILTON: You are attempting to artificially peg the price of truth. Just like currency, when you flood the market with counterfeit narratives, you trigger hyperinflation of doubt. You may survive the election, but you will bankrupt the social trust required to govern.", 'milton');
                else {
                    if (state.miltonAskedThisTurn) print("MILTON: I already gave you my analysis, boss. The ball is in your court.", 'milton');
                    else { print(crisisProfiles[state.currentCrisis].milton, 'milton'); state.miltonAskedThisTurn = true; }
                }
                enableInput(); return; 
            }

            let initialMode = state.mode;
            let dict = state.mode === 'war' ? warCommands : (state.mode === 'dark' ? darkCommands : macroCommands);
            let tokens = rawVal.replace(/ and /g, ',').split(',').map(t => t.trim()).filter(t => t.length > 0 && !/^[,\s]*$/.test(t));
            let activeCommands = []; let unrecognized = false;

            for (let token of tokens) {
                let found = false;
                for (let key in dict) {
                    if (key === token || dict[key].shortcut === token || dict[key].name.toLowerCase() === token) {
                        if (!activeCommands.includes(key)) activeCommands.push(key);
                        found = true; break;
                    }
                }
                if (!found) unrecognized = true;
            }

            if (unrecognized || activeCommands.length === 0) {
                print(`${state.mode === 'war' ? 'COMMAND:~$' : (state.mode === 'dark' ? 'SHADOW:~$' : 'POTUS:~$')} ${rawVal}`, 'user-echo');
                print("SYSTEM: Unrecognized directive found in package. Aborting to prevent execution errors.", 'danger');
                enableInput(); return;
            }

            let execNames = activeCommands.map(k => dict[k].name);
            print(`${state.mode === 'war' ? 'COMMAND:~$' : (state.mode === 'dark' ? 'SHADOW:~$' : 'POTUS:~$')} EXECUTE: [ ${execNames.join(' | ')} ]`, 'user-echo');
            
            // --- NEW: Print policy reaction comments ---
            if (activeCommands.includes('pc')) print(checkPolicyReaction('priceControls', 'implementation'), 'milton');
            if (activeCommands.includes('ms') || activeCommands.includes('is')) print(checkPolicyReaction('stimulus', 'implementation'), 'milton');
            if (activeCommands.includes('qe')) print(checkPolicyReaction('quantitativeEasing', 'implementation'), 'milton');
            if (activeCommands.includes('ta')) print(checkPolicyReaction('tariffs', 'implementation'), 'milton');
            
            let synergies = [];

            if (state.mode === 'macro') {
                if (!activeCommands.includes('pc')) state.hasPriceControls = false; 
                if (activeCommands.includes('rr') && activeCommands.includes('cr')) { activeCommands = activeCommands.filter(c => c !== 'rr' && c !== 'cr'); synergies.push("MILTON: Raising and cutting rates simultaneously? The Fed is paralyzed. Zero net monetary effect."); queueNews("[FED WATCH] Chaotic mixed signaling from Chairman paralyzes markets.", 0); }
                if (activeCommands.includes('ta') && activeCommands.includes('ft')) { activeCommands = activeCommands.filter(c => c !== 'ta' && c !== 'ft'); synergies.push("MILTON: Tariffs and free trade on the same day. Customs is ignoring you."); queueNews("[TRADE] Commerce Department issues conflicting directives.", 0); }
                if ((activeCommands.includes('is') || activeCommands.includes('ms')) && activeCommands.includes('cs')) { activeCommands = activeCommands.filter(c => c !== 'is' && c !== 'ms' && c !== 'cs'); synergies.push("MILTON: Massive spending combined with severe austerity? The treasury is deadlocked. Zero net fiscal effect."); }
                if ((activeCommands.includes('ms') || activeCommands.includes('is')) && activeCommands.includes('pc')) { synergies.push("MILTON: Stimulus combined with price controls... You've flooded the market with cash but made it illegal for prices to adjust. Prepare for catastrophic supply shortages."); state.gdp -= 3.0; state.approval -= 8; queueNews("[CRISIS] Severe shortages reported as demand vastly outstrips price-capped supply.", 1); }
            }

            if (state.mode === 'war') { if (activeCommands.includes('wd')) activeCommands = ['wd']; }
            if (state.mode === 'dark') {
                if (activeCommands.includes('ff') && activeCommands.includes('ce')) { synergies.push("CHIEF OF STAFF: Manufacturing a crisis and immediately censoring all dissenting questions. Brutally effective narrative lock, but society is cracking under the paranoia."); state.dark.narrative += 20; state.dark.paranoia += 30; }
                if (activeCommands.includes('ex')) activeCommands = ['ex'];
            }

            for (let syn of synergies) { if (syn.startsWith("GENERAL")) print(syn, 'general'); else if (syn.startsWith("CHIEF")) print(syn, 'chief'); else print(syn, 'milton'); }
            for (let key of activeCommands) dict[key].effect();
            
            processTicker(); 
            
            if (state.mode !== initialMode) { if (state.mode === 'war' || state.mode === 'dark') setTimeout(enableInput, 800); return; }
            if (state.subMode === 'artillery') { return; }

            if (state.mode === 'war') {
                // --- FIXED: Removed reference to non-existent 'nk' command ---
                if (state.war.enemyStrength > 0) {
                    state.war.casualties += Math.floor(Math.random()*30); 
                    state.approval -= 2; 
                }
                updateDashboard();
                if (state.war.tension >= 100) { playAlarm(true); setTimeout(() => { DOM.screen.style.backgroundColor = '#fff'; DOM.screen.innerHTML = '<div style="color:black; background:white; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:50px; font-weight:bold;">MUTUALLY ASSURED DESTRUCTION</div>'; }, 1000); return; }
                if (state.war.enemyStrength <= 0) { setTimeout(()=>endWar(true), 1000); return; }
                if (state.approval <= 15) { print("SYSTEM: WAR PROTESTS OVERWHELM CAPITAL. CONGRESS VOTES IMPEACHMENT.", 'danger'); return; }
                setTimeout(enableInput, 500);
            }

            if (state.mode === 'dark') {
                if (!activeCommands.includes('ex')) {
                    state.dark.narrative = Math.max(0, state.dark.narrative - 5); 
                    state.dark.compliance = Math.max(0, state.dark.compliance - 2); 
                    
                    // --- FIXED: Cleaned up redundant min/max clamping ---
                    state.dark.narrative = Math.min(100, state.dark.narrative);
                    state.dark.compliance = Math.min(100, state.dark.compliance);
                    state.dark.paranoia = Math.min(100, state.dark.paranoia);
                    state.dark.trust = Math.max(0, Math.min(100, state.dark.trust));
                    state.approval = Math.min(100, Math.max(0, state.approval));
                    
                    updateDashboard();
                    if (state.dark.paranoia >= 90) { print("SYSTEM: PUBLIC PARANOIA CRITICAL. MASS CIVIL UNREST DETECTED.", 'danger'); state.approval -= 15; }
                    if (state.dark.trust <= 10) { print("SYSTEM: INSTITUTIONAL TRUST EVAPORATED. DOLLAR LOSING RESERVE STATUS.", 'danger'); state.inflation += 2.0; queueNews("[GLOBAL] Investors dump dollar assets amid collapse of US institutional integrity.", 0); }
                    if (state.approval <= 15) { print("SYSTEM: RIOTERS BREACH GATES. CONGRESS VOTES IMPEACHMENT.", 'danger'); return; }
                    setTimeout(enableInput, 500);
                }
                return;
            }

            if (state.tariffRate > 0) { let drag = state.tariffRate * 0.05; state.inflation += drag; state.gdp -= (drag * 0.5); }
            let drift = 0; if (state.inflation > 3.0) drift -= (state.inflation - 3.0) * 1.5; if (state.unemployment > 5.0) drift -= (state.unemployment - 5.0) * 1.5; if (state.gdp < 1.0) drift -= 2; if (state.inflation <= 2.5) drift += 2.5; if (state.unemployment <= 4.5) drift += 2.0; if (state.gdp >= 3.0) drift += 2.0; if (state.sp500 >= 5200) drift += 1.5; state.approval += drift;
            
            state.gdp = Math.max(-15, state.gdp); 
            state.unemployment = Math.min(35, Math.max(2, state.unemployment)); 
            state.inflation = Math.max(-3, state.inflation); 
            state.approval = Math.min(100, Math.max(0, state.approval)); 
            state.congress = Math.min(100, Math.max(0, state.congress)); 
            state.fedCredibility = Math.min(100, Math.max(0, state.fedCredibility)); 
            state.sp500 = Math.max(500, state.sp500);
            
            if (drift >= 4) print(`SYSTEM: Macro stabilization noted by electorate. Approval +${drift.toFixed(1)}%`);
            if (drift <= -4) print(`SYSTEM: Macro distress penalizing incumbent. Approval ${drift.toFixed(1)}%`, 'danger');

            updateDashboard();

            if (state.congress <= 15) { 
                print("\nSYSTEM: IMPEACHMENT PASSED. EXECUTIVE REMOVED.", 'danger'); 
                print("CHIEF OF STAFF: Pack your bags, sir. We're done.", 'chief'); 
                print("\nSYSTEM: SIMULATION CONCLUDED. TYPE 'RESET' TO RESTART.", 'system');
                enableInput(); return; 
            }
            
            setTimeout(advanceTimeline, 800);
        }
        
        DOM.cmd.addEventListener('input', (e) => { DOM.visInput.textContent = e.target.value.toLowerCase(); });
        DOM.cmd.addEventListener('keydown', (e) => { if (e.key === 'Backspace' || e.key.length === 1) playClick(); if (e.key === 'Enter') processInput(); });
        DOM.cmd.addEventListener('blur', () => { if (state.isOn && !DOM.cmd.disabled) setTimeout(() => DOM.cmd.focus(), 10); });

        document.addEventListener('mouseover', (e) => {
            const target = e.target.closest('.hover-term'); if (!target || !state.isOn) return;
            const data = contextDict[target.getAttribute('data-term')];
            if(data) {
                let colorVar = state.mode === 'dark' ? 'var(--dark)' : (state.mode === 'war' ? 'var(--war)' : 'var(--phosphor)');
                DOM.dictTitle.style.color = colorVar; DOM.dictTitle.style.borderColor = colorVar;
                DOM.dictTitle.textContent = data.title; DOM.dictDef.textContent = data.def;
                DOM.dictHist.style.display = 'block'; DOM.dictHist.textContent = "PRECEDENT: " + data.hist;
            }
        });
        
        document.addEventListener('mouseout', (e) => {
            const target = e.target.closest('.hover-term'); if (!target || !state.isOn) return;
            let colorVar = 'var(--phosphor)';
            DOM.dictTitle.style.color = colorVar; DOM.dictTitle.style.borderColor = colorVar;
            DOM.dictTitle.textContent = "INTELLIGENCE"; DOM.dictDef.textContent = "Hover over metrics to access structural definitions and precedents.";
            DOM.dictHist.style.display = 'none';
        });

    </script>
