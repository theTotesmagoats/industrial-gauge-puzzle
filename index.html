<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Princess Castle Builder</title>
    <style>
        :root {
            --bg-top: #ffafbd;
            --bg-bottom: #ffc3a0;
            --pink-bright: #ff69b4;
            --pink-soft: #ffb6c1;
        }
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: linear-gradient(to bottom, var(--bg-top), var(--bg-bottom)); height: 100vh; touch-action: none; }
        canvas { display: block; }
        
        #ui-tray {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(255, 255, 255, 0.8);
            padding: 15px 25px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px); border: 3px solid white;
        }
        
        .tool {
            font-size: 3rem; cursor: pointer; transition: transform 0.1s;
            user-select: none; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
        }
        .tool:active { transform: scale(1.3); }
        .tool.selected { border-bottom: 4px solid var(--pink-bright); }

        #undo-btn {
            position: fixed; top: 20px; right: 20px;
            padding: 15px 25px; font-size: 1.5rem; font-weight: bold;
            background: white; border: none; border-radius: 15px;
            color: var(--pink-bright); box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
        }
    </style>
</head>
<body>

<button id="undo-btn">Oops! (Undo)</button>

<div id="ui-tray">
    <div class="tool" onclick="setTool('🏰')">🏰</div>
    <div class="tool" onclick="setTool('🗼')">🗼</div>
    <div class="tool" onclick="setTool('🪟')">🪟</div>
    <div class="tool" onclick="setTool('🚩')">🚩</div>
    <div class="tool" onclick="setTool('🌸')">🌸</div>
    <div class="tool" onclick="setTool('✨')">✨</div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let currentTool = '🏰';
    let elements = [];
    let particles = [];

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        draw();
    }

    function setTool(tool) {
        currentTool = tool;
        // Visual feedback for tool selection
        document.querySelectorAll('.tool').forEach(el => el.classList.remove('selected'));
        event.target.classList.add('selected');
    }

    canvas.addEventListener('pointerdown', (e) => {
        const x = e.clientX;
        const y = e.clientY;
        
        // Add element to the world
        elements.push({
            char: currentTool,
            x: x,
            y: y,
            size: 60 + Math.random() * 40 // Variations in size
        });

        // Create Sparkles
        for(let i=0; i<15; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 1.0,
                color: `hsl(${330 + Math.random() * 30}, 100%, 70%)`
            });
        }
    });

    document.getElementById('undo-btn').addEventListener('click', () => {
        elements.pop();
    });

    function draw() {
        ctx.clearRect(0, 0, width, height);

        // Draw Grass/Floor
        ctx.fillStyle = '#98fb98';
        ctx.fillRect(0, height - 100, width, 100);

        // Draw Placed Elements
        elements.forEach(el => {
            ctx.font = `${el.size}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(el.char, el.x, el.y);
        });

        // Draw Particles
        particles.forEach((p, i) => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
            ctx.fill();
            
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.1; // Gravity
            p.life -= 0.02;
            if (p.life <= 0) particles.splice(i, 1);
        });
        ctx.globalAlpha = 1.0;

        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
</script>
</body>
</html>
