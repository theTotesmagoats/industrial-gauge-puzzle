<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ORBITAL TACTICAL COMMAND</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-base: #03070b;
            --panel-bg: rgba(5, 12, 20, 0.85);
            --cyan: #00f0ff;
            --cyan-dim: rgba(0, 240, 255, 0.2);
            --amber: #ffb000;
            --crimson: #ff2a2a;
            --grid-line: rgba(0, 240, 255, 0.1);
        }

        body {
            margin: 0;
            background-color: var(--bg-base);
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* CRT Overlay & Scanlines */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .layout {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            grid-template-rows: 60px 1fr 200px;
            gap: 15px;
            padding: 15px;
            height: 100vh;
            box-sizing: border-box;
            position: relative;
            z-index: 3;
        }

        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--cyan);
            padding-bottom: 10px;
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            font-size: 32px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--cyan);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .alert-badge {
            background: var(--amber);
            color: #000;
            padding: 2px 8px;
            font-size: 14px;
            border-radius: 2px;
            animation: pulse 2s infinite;
        }

        .mfd { /* Multi-Function Display */
            background: var(--panel-bg);
            border: 1px solid var(--cyan-dim);
            box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.05);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Sci-Fi Corner Cuts */
        .mfd::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px;
            width: 15px; height: 15px;
            border-top: 2px solid var(--cyan);
            border-left: 2px solid var(--cyan);
        }
        .mfd::after {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px;
            width: 15px; height: 15px;
            border-bottom: 2px solid var(--cyan);
            border-right: 2px solid var(--cyan);
        }

        .mfd-title {
            font-family: 'Rajdhani', sans-serif;
            background: var(--cyan-dim);
            padding: 4px 10px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--cyan);
        }

        .data-list {
            padding: 10px;
            font-size: 12px;
            flex-grow: 1;
            overflow: hidden;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            border-bottom: 1px dashed rgba(0, 240, 255, 0.2);
        }

        .val { color: #fff; text-shadow: 0 0 5px #fff; }

        /* Power Routing Bars */
        .power-routing { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .sys-label { font-size: 11px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .bar-bg { width: 100%; height: 12px; background: #000; border: 1px solid var(--cyan-dim); cursor: pointer;}
        .bar-fill { height: 100%; background: var(--cyan); transition: width 0.1s ease; }
        .bar-fill.wep { background: var(--crimson); }
        .bar-fill.eng { background: var(--amber); }

        /* Central Canvas */
        #nav-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .center-mfd { grid-row: 2 / 4; grid-column: 2; border: 1px solid var(--cyan); }

        /* Hex Stream Log */
        .hex-log {
            font-size: 10px;
            color: var(--amber);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            padding: 10px;
            opacity: 0.8;
        }

        /* Interactive Button */
        .exec-btn {
            background: transparent;
            border: 1px solid var(--crimson);
            color: var(--crimson);
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 4px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            width: 100%;
            height: 100%;
        }
        .exec-btn:hover { background: var(--crimson); color: #000; box-shadow: 0 0 20px var(--crimson); }
        .exec-btn:active { transform: scale(0.98); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="layout">
    <div class="header">
        <h1>[ <span style="color: #fff;">USSC VANGUARD</span> ] TACTICAL BRIDGE <span class="alert-badge">DEFCON 2</span></h1>
        <div style="text-align: right; font-size: 18px;">
            <div id="sys-clock">00:00:00 UTC</div>
            <div style="font-size: 12px; color: var(--amber);">ORBITAL INCLINATION: 42.5°</div>
        </div>
    </div>

    <div class="mfd" style="grid-row: 2 / 4; grid-column: 1;">
        <div class="mfd-title">VESSEL TELEMETRY</div>
        <div class="data-list">
            <div class="data-row"><span>VELOCITY</span><span class="val" id="vel">24,532 km/h</span></div>
            <div class="data-row"><span>ALTITUDE</span><span class="val" id="alt">408.2 km</span></div>
            <div class="data-row"><span>HEADING</span><span class="val" id="hdg">045.2° TRU</span></div>
            <div class="data-row"><span>PITCH</span><span class="val" id="pit">+12.4°</span></div>
            <div class="data-row"><span>YAW</span><span class="val" id="yaw">-02.1°</span></div>
            <div class="data-row"><span>ROLL</span><span class="val" id="rol">00.0°</span></div>
        </div>

        <div class="mfd-title" style="margin-top: auto;">POWER ROUTING</div>
        <div class="power-routing">
            <div>
                <div class="sys-label"><span style="color: var(--cyan);">SHIELDS</span><span id="pwr-shd">100%</span></div>
                <div class="bar-bg" onclick="setPower('shd', event)"><div class="bar-fill" id="bar-shd" style="width: 100%;"></div></div>
            </div>
            <div>
                <div class="sys-label"><span style="color: var(--amber);">ENGINES</span><span id="pwr-eng">60%</span></div>
                <div class="bar-bg" onclick="setPower('eng', event)"><div class="bar-fill eng" id="bar-eng" style="width: 60%;"></div></div>
            </div>
            <div>
                <div class="sys-label"><span style="color: var(--crimson);">WEAPONS</span><span id="pwr-wep">30%</span></div>
                <div class="bar-bg" onclick="setPower('wep', event)"><div class="bar-fill wep" id="bar-wep" style="width: 30%;"></div></div>
            </div>
        </div>
    </div>

    <div class="mfd center-mfd">
        <div class="mfd-title" style="position: absolute; z-index: 10; border: none; background: transparent;">MAIN SENSOR ARRAY [3D PROJECTION]</div>
        <canvas id="nav-canvas"></canvas>
    </div>

    <div class="mfd" style="grid-row: 2; grid-column: 3;">
        <div class="mfd-title">SYSTEM MEMORY DUMP</div>
        <div class="hex-log" id="hex-container">
            </div>
    </div>

    <div class="mfd" style="grid-row: 3; grid-column: 3; justify-content: center; align-items: center; padding: 20px;">
        <button class="exec-btn" id="warp-btn">INITIALIZE<br>BURN VECTOR</button>
    </div>
</div>

<script>
    // --- CANVAS 3D ENGINE ---
    const canvas = document.getElementById('nav-canvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // 3D Planet Variables
    const nodes = [];
    const R = 150; // Radius of wireframe sphere
    let angleX = 0, angleY = 0;
    let isWarping = false;
    let warpSpeed = 0;

    // Generate Sphere Nodes (Math for your son: Spherical to Cartesian coordinates)
    for (let lat = -90; lat <= 90; lat += 15) {
        for (let lon = 0; lon < 360; lon += 15) {
            const latRad = lat * (Math.PI / 180);
            const lonRad = lon * (Math.PI / 180);
            nodes.push({
                x: R * Math.cos(latRad) * Math.cos(lonRad),
                y: R * Math.sin(latRad),
                z: R * Math.cos(latRad) * Math.sin(lonRad),
                baseLat: lat, baseLon: lon
            });
        }
    }

    // Engine Loop
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        // Tactical Grid
        ctx.strokeStyle = 'rgba(0, 240, 255, 0.1)';
        ctx.beginPath();
        ctx.arc(cx, cy, R + 50, 0, Math.PI * 2);
        ctx.arc(cx, cy, R + 100, 0, Math.PI * 2);
        ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height);
        ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy);
        ctx.stroke();

        // 3D Rotation Matrices
        angleY += isWarping ? 0.05 : 0.005; 
        angleX = 0.3; // Slight tilt
        
        const cosX = Math.cos(angleX), sinX = Math.sin(angleX);
        const cosY = Math.cos(angleY), sinY = Math.sin(angleY);

        ctx.fillStyle = isWarping ? '#fff' : '#00f0ff';
        
        // Draw Nodes
        nodes.forEach(n => {
            // Rotate Y
            let x1 = n.x * cosY - n.z * sinY;
            let z1 = n.z * cosY + n.x * sinY;
            // Rotate X
            let y2 = n.y * cosX - z1 * sinX;
            let z2 = z1 * cosX + n.y * sinX;

            // Perspective Projection
            const scale = 300 / (300 + z2);
            const px = cx + x1 * scale;
            const py = cy + y2 * scale;

            // Back-face culling (fade points on the back of the sphere)
            if (z2 < 0) {
                ctx.globalAlpha = 0.2;
            } else {
                ctx.globalAlpha = isWarping ? Math.random() : 0.8;
            }

            // Draw Point
            ctx.fillRect(px, py, 2, 2);

            // Warp lines effect
            if (isWarping && z2 > 0) {
                ctx.strokeStyle = 'rgba(255, 42, 42, 0.5)';
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(px + (x1 * scale * warpSpeed), py + (y2 * scale * warpSpeed));
                ctx.stroke();
            }
        });
        
        ctx.globalAlpha = 1.0;

        // Draw Targeting Reticle
        ctx.strokeStyle = 'var(--amber)';
        ctx.lineWidth = 1;
        const s = Math.sin(Date.now() / 500) * 10 + 30; // Pulsing square
        ctx.strokeRect(cx - s, cy - s, s*2, s*2);
        
        // Update Telemetry Text Jitter
        if (!isWarping && Math.random() > 0.8) {
            document.getElementById('alt').innerText = (408.0 + Math.random()).toFixed(1) + " km";
            document.getElementById('vel').innerText = (24530 + Math.random()*5).toFixed(0) + " km/h";
        } else if (isWarping) {
            warpSpeed = Math.min(warpSpeed + 0.1, 5);
            document.getElementById('vel').innerText = "C-FRACTIONAL";
            document.getElementById('vel').style.color = "var(--crimson)";
        }

        requestAnimationFrame(animate);
    }

    // --- SYSTEMS LOGIC ---
    
    // Hex Log Generator
    const hexContainer = document.getElementById('hex-container');
    function updateHex() {
        let out = "";
        for(let i=0; i<48; i++) {
            out += `<div>0x${Math.floor(Math.random()*65535).toString(16).padStart(4, '0')}</div>`;
        }
        hexContainer.innerHTML = out;
    }
    setInterval(updateHex, 150);

    // Clock
    setInterval(() => {
        const d = new Date();
        document.getElementById('sys-clock').innerText = d.toISOString().split('T')[1].split('.')[0] + " UTC";
    }, 1000);

    // Interactive Power Routing
    window.setPower = function(sys, e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const percent = Math.max(5, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
        document.getElementById(`bar-${sys}`).style.width = percent + '%';
        document.getElementById(`pwr-${sys}`).innerText = Math.floor(percent) + '%';
    }

    // Burn Action
    const btn = document.getElementById('warp-btn');
    btn.addEventListener('mousedown', () => {
        isWarping = true;
        btn.innerText = "VECTOR LOCKED\nBURNING...";
        btn.style.color = "#000";
        btn.style.background = "var(--crimson)";
    });
    btn.addEventListener('mouseup', () => {
        isWarping = false;
        warpSpeed = 0;
        btn.innerText = "INITIALIZE\nBURN VECTOR";
        btn.style.color = "var(--crimson)";
        btn.style.background = "transparent";
        document.getElementById('vel').style.color = "#fff";
    });
    btn.addEventListener('mouseleave', () => { isWarping = false; warpSpeed = 0; btn.style.background = "transparent"; document.getElementById('vel').style.color = "#fff"; btn.innerText = "INITIALIZE\nBURN VECTOR"; });

    // Init
    animate();
</script>
</body>
</html>
