<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Unseen: Economic Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a0a; color: #fff; font-family: monospace; user-select: none; }
        canvas { display: block; }
        #hud { position: absolute; top: 20px; left: 20px; width: 300px; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #333; }
        .metric { margin-bottom: 10px; font-size: 14px; }
        .bar-container { width: 100%; height: 10px; background: #222; margin-top: 4px; position: relative; }
        .bar { height: 100%; transition: width 0.1s linear; }
        #slider-container { margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .label { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        #alarms { position: absolute; top: 20px; right: 20px; color: #ff3333; font-weight: bold; font-size: 16px; text-align: right; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="metric">
            Purchasing Power (Real GDP) <span id="gdp-val">100</span>
            <div class="bar-container"><div id="gdp-bar" class="bar" style="width: 50%; background: #00ffcc;"></div></div>
        </div>
        <div class="metric">
            Political Approval <span id="pol-val">100%</span>
            <div class="bar-container"><div id="pol-bar" class="bar" style="width: 100%; background: #00ccff;"></div></div>
        </div>
        <div class="metric">
            Foreign Taxpayer Pool (Subsidies) <span id="foreign-val">100%</span>
            <div class="bar-container"><div id="foreign-bar" class="bar" style="width: 100%; background: #ffaa00;"></div></div>
        </div>

        <div id="slider-container">
            <div class="label"><span>Tariff: Foreign Steel</span><span id="tariff-val">0%</span></div>
            <input type="range" id="tariff-slider" min="0" max="100" value="0">
        </div>
    </div>

    <div id="alarms"></div>
    <canvas id="simCanvas"></canvas>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // DOM Elements
    const gdpBar = document.getElementById('gdp-bar');
    const polBar = document.getElementById('pol-bar');
    const foreignBar = document.getElementById('foreign-bar');
    const tariffSlider = document.getElementById('tariff-slider');
    const tariffValDisplay = document.getElementById('tariff-val');
    const alarms = document.getElementById('alarms');

    // State Variables
    let tariff = 0;
    let purchasingPower = 50; 
    let politicalApproval = 100;
    let foreignTaxPool = 100;
    let consumerSurplus = 0;
    let newTechSpawned = false;

    tariffSlider.addEventListener('input', (e) => {
        tariff = e.target.value / 100;
        tariffValDisplay.innerText = `${e.target.value}%`;
    });

    // Architecture
    const nodes = {
        foreign: { x: canvas.width * 0.1, y: canvas.height * 0.3, radius: 40, color: '#ffaa00', name: 'Foreign Subsidized Steel', active: true },
        domSteel: { x: canvas.width * 0.1, y: canvas.height * 0.7, radius: 40, color: '#00ccff', name: 'Domestic Steel', health: 100 },
        mfg: { x: canvas.width * 0.5, y: canvas.height * 0.5, radius: 50, color: '#cccccc', name: 'Manufacturing' },
        consumer: { x: canvas.width * 0.9, y: canvas.height * 0.5, radius: 60, color: '#00ffcc', name: 'Consumer Household' },
        newTech: { x: canvas.width * 0.5, y: canvas.height * 0.8, radius: 0, targetRadius: 50, color: '#ff00ff', name: 'Advanced Tech (Creative Destruction)', active: false }
    };

    let particles = [];

    class Particle {
        constructor(startX, startY, targetX, targetY, type) {
            this.x = startX;
            this.y = startY;
            this.tx = targetX;
            this.ty = targetY;
            
            // Add slight curve/noise to path
            this.angle = Math.atan2(targetY - startY, targetX - startX);
            this.speed = Math.random() * 2 + 1.5;
            this.vx = Math.cos(this.angle) * this.speed;
            this.vy = Math.sin(this.angle) * this.speed;
            
            this.type = type; // 'cheap_steel', 'dom_steel', 'expensive_good', 'cheap_good', 'new_tech'
            this.color = this.getColor();
            this.life = 1;
        }

        getColor() {
            if (this.type === 'cheap_steel') return '#ffaa00';
            if (this.type === 'dom_steel') return '#00ccff';
            if (this.type === 'expensive_good') return '#ff3333'; // The unseen cost cascade
            if (this.type === 'cheap_good') return '#00ffcc';
            if (this.type === 'new_tech') return '#ff00ff';
            return '#fff';
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            
            // Check collision with target
            const dist = Math.hypot(this.tx - this.x, this.ty - this.y);
            if (dist < 20) {
                this.life = 0;
                return true; // Arrived
            }
            return false;
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function spawnParticles() {
        // 1. Foreign Subsidy Logic
        if (nodes.foreign.active && foreignTaxPool > 0) {
            // Foreign dumps cheap steel. Tax pool drains.
            foreignTaxPool -= 0.05;
            
            // Tariff wall check. If tariff is high, probability of particle making it drops.
            if (Math.random() > tariff) {
                particles.push(new Particle(nodes.foreign.x, nodes.foreign.y, nodes.mfg.x, nodes.mfg.y, 'cheap_steel'));
            } else {
                // Deadweight loss / blocked
                ctx.fillStyle = 'rgba(255, 51, 51, 0.5)';
                ctx.fillRect(nodes.foreign.x + 50, nodes.foreign.y + (Math.random()*40-20), 5, 5);
            }
        }

        // 2. Domestic Steel Logic
        if (nodes.domSteel.health > 0) {
            // Dom Steel struggles to compete with subsidized foreign goods unless protected by tariff
            if (tariff < 0.3 && foreignTaxPool > 0) {
                nodes.domSteel.health -= 0.1; // Frictional unemployment
                politicalApproval -= 0.05; // The political pressure
            } else {
                nodes.domSteel.health = Math.min(100, nodes.domSteel.health + 0.2);
                politicalApproval = Math.min(100, politicalApproval + 0.1);
                particles.push(new Particle(nodes.domSteel.x, nodes.domSteel.y, nodes.mfg.x, nodes.mfg.y, 'dom_steel'));
            }
        }

        // 3. Manufacturing to Consumer Logic (The Cost Cascade)
        if (Math.random() > 0.1) {
            // If protected by tariff, inputs are expensive. If subsidized, inputs are cheap.
            let outType = (tariff > 0.1 || nodes.domSteel.health > 80) ? 'expensive_good' : 'cheap_good';
            
            // If foreign runs out of subsidies and tariff is 0, market normalizes.
            if (foreignTaxPool <= 0 && tariff === 0) outType = 'cheap_good';

            particles.push(new Particle(nodes.mfg.x, nodes.mfg.y, nodes.consumer.x, nodes.consumer.y, outType));
        }

        // 4. Creative Destruction (New Tech Spawn)
        if (newTechSpawned) {
            particles.push(new Particle(nodes.newTech.x, nodes.newTech.y, nodes.consumer.x, nodes.consumer.y, 'new_tech'));
        }
    }

    function updateLogic() {
        // Foreign collapse
        if (foreignTaxPool <= 0) {
            foreignTaxPool = 0;
            nodes.foreign.active = false;
        }

        // Game Over condition (Political)
        if (politicalApproval <= 0) {
            alarms.innerText = "GOVERNMENT COLLAPSE: Approval hit 0%.";
            return;
        }

        // Purchasing Power Decay (Baseline inflation/consumption)
        purchasingPower -= 0.05;

        // Process Arrivals
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            if (p.update()) { // Arrived
                if (p.tx === nodes.consumer.x && p.ty === nodes.consumer.y) {
                    if (p.type === 'cheap_good') {
                        purchasingPower += 0.1; // Extends standard of living
                        consumerSurplus += 0.1; // Banks surplus capital
                    } else if (p.type === 'expensive_good') {
                        purchasingPower -= 0.05; // The hidden tax of the tariff
                    } else if (p.type === 'new_tech') {
                        purchasingPower += 0.3; // High velocity/value multiplier
                    }
                }
                particles.splice(i, 1);
            }
        }

        // The Creative Destruction Trigger
        if (consumerSurplus > 50 && nodes.domSteel.health <= 0 && !newTechSpawned) {
            newTechSpawned = true;
            nodes.newTech.active = true;
            alarms.innerText = "SURPLUS CAPITAL DEPLOYED: New Tech Sector Emerged.";
            alarms.style.color = "#ff00ff";
        }

        // Node animation
        if (nodes.newTech.active && nodes.newTech.radius < nodes.newTech.targetRadius) {
            nodes.newTech.radius += 0.5;
        }

        // Clamp values
        purchasingPower = Math.max(0, Math.min(100, purchasingPower));
        
        // Update UI
        gdpBar.style.width = `${purchasingPower}%`;
        document.getElementById('gdp-val').innerText = Math.floor(purchasingPower);
        
        polBar.style.width = `${politicalApproval}%`;
        document.getElementById('pol-val').innerText = Math.floor(politicalApproval) + "%";
        
        foreignBar.style.width = `${foreignTaxPool}%`;
        
        // Alarms
        if (!newTechSpawned && politicalApproval < 30) {
            alarms.innerText = "WARNING: Domestic Steel collapsing. Political pressure critical.";
        } else if (!newTechSpawned && politicalApproval >= 30) {
            alarms.innerText = "";
        }
    }

    function drawNodes() {
        ctx.globalCompositeOperation = 'lighter';
        for (const key in nodes) {
            const n = nodes[key];
            if (n.radius <= 0 || (key === 'foreign' && !n.active && foreignTaxPool <= 0)) continue;
            
            // Draw Glow
            const gradient = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
            gradient.addColorStop(0, n.color);
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
            ctx.fill();

            // Labels
            ctx.fillStyle = '#fff';
            ctx.font = '12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(n.name, n.x, n.y - n.radius - 10);
            
            // Health indicator for steel
            if (key === 'domSteel') {
                ctx.fillStyle = n.health > 20 ? '#00ccff' : '#ff3333';
                ctx.fillText(`Health: ${Math.floor(n.health)}%`, n.x, n.y + n.radius + 15);
            }
        }
        ctx.globalCompositeOperation = 'source-over';
    }

    function loop() {
        ctx.fillStyle = 'rgba(10, 10, 10, 0.3)'; // Trail effect
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (politicalApproval > 0 && purchasingPower > 0) {
            spawnParticles();
            updateLogic();
        } else if (purchasingPower <= 0) {
            alarms.innerText = "SYSTEM FAILURE: Purchasing Power Exhausted (Inflation Trap).";
        }

        drawNodes();
        particles.forEach(p => p.draw());

        requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    loop();
</script>
</body>
</html>
