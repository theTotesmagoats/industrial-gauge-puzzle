<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Industrial Control Panel</title>
    <style>
        body {
            background: #1a1a1a;
            color: #33ff33;
            font-family: 'Courier New', monospace;
            text-align: center;
            padding: 40px;
            overflow: hidden;
            transition: transform 0.05s linear;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 { font-size: 2rem; text-shadow: 2px 2px #000; }
        
        /* Gauge container */
        .gauges {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 40px;
        }

        /* Individual gauge styling */
        .gauge-box {
            background: #222;
            border: 3px solid #555;
            border-radius: 10px;
            padding: 15px;
            width: 200px;
            position: relative;
        }

        /* Labels at ends of gauge */
        .gauge-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        /* The actual needle bar */
        .gauge-track {
            height: 30px;
            background: linear-gradient(to right,
                #00ffff 0%,     /* Cool/Low/Safe left */
                #ff4500 100%);  /* Hot/High/Danger right */
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .needle {
            width: 6px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 4px #ff0000;
            position: absolute;
            left: 0%; /* Will be set by JS */
            transition: left 0.3s ease-out;
        }

        .gauge-value {
            margin-top: 5px;
            font-weight: bold;
        }

        /* Buttons section */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        button {
            background: #333;
            color: white;
            border: 3px outset #555;
            padding: 15px 25px;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 4px #111;
        }

        button:active {
            border-style: inset;
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Shaking animation */
        .shake {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* Cracks overlay */
        .cracks {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: 
                linear-gradient(45deg, transparent 49%, rgba(255,255,255,0.6) 50%),
                linear-gradient(-45deg, transparent 49%, rgba(255,255,255,0.6) 50%);
            background-size: 100px 100px;
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }

        .cracks.active {
            opacity: 0.8;
        }

        /* Shatter effect */
        .shatter {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in;
            z-index: 999;
        }

        .shatter.active {
            opacity: 1;
            animation: flash 0.1s infinite;
        }

        @keyframes flash {
            0% { background: white; }
            50% { background: #ffaaaa; }
            100% { background: white; }
        }

        .reset-text {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: #33ff33;
            text-shadow: 0 0 10px red;
            display: none;
        }

        .reset-text.show {
            display: block;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        }

    </style>
</head>
<body>

<div class="container">
    <h1>INDUSTRIAL CONTROL PANEL — SYSTEM STATUS</h1>
    
    <div class="gauges">
        <!-- Heat Gauge -->
        <div class="gauge-box">
            <div class="gauge-labels"><span>Cool</span><span>Hot</span></div>
            <div class="gauge-track">
                <div class="needle" id="heat-needle"></div>
            </div>
            <div class="gauge-value">HEAT: <span id="heat-val">0</span>%</div>
        </div>

        <!-- Pressure Gauge -->
        <div class="gauge-box">
            <div class="gauge-labels"><span>High</span><span>Low</span></div>
            <div class="gauge-track">
                <div class="needle" id="pressure-needle"></div>
            </div>
            <div class="gauge-value">PRESSURE: <span id="pressure-val">100</span>%</div>
        </div>

        <!-- Safety Gauge -->
        <div class="gauge-box">
            <div class="gauge-labels"><span>Safe</span><span>Danger</span></div>
            <div class="gauge-track">
                <div class="needle" id="danger-needle"></div>
            </div>
            <div class="gauge-value">DANGER: <span id="danger-val">0</span>%</div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-heat" onclick="pressButton('heat')">HEAT ON 🔴</button>
        <button id="btn-vent" onclick="pressButton('vent')">VENT OPEN 🔵</button>
        <button id="btn-cool" onclick="pressButton('cool')">COOL CYCLE ⚪</button>
    </div>
    
    <p>Goal: Maximize all gauges to trigger emergency protocol.</p>
</div>

<div class="cracks" id="cracks"></div>
<div class="shatter" id="shatter"></div>
<div class="reset-text" id="reset-msg">SYSTEM REBOOTING...</div>

<script>
    // Game state
    let heat = 0;
    let pressure = 100; // High = 100%, Low = 0%
    let danger = 0;

    function updateGauges() {
        // Clamp values between 0-100
        heat = Math.max(0, Math.min(100, heat));
        pressure = Math.max(0, Math.min(100, pressure));
        danger = Math.max(0, Math.min(100, danger));

        // Update DOM
        document.getElementById('heat-val').textContent = heat;
        document.getElementById('pressure-val').textContent = 100 - pressure; // Invert: high pressure means low "low" value
        document.getElementById('danger-val').textContent = danger;

        document.getElementById('heat-needle').style.left = heat + '%';
        document.getElementById('pressure-needle').style.left = (100 - pressure) + '%'; // Inverted scale
        document.getElementById('danger-needle').style.left = danger + '%';

        // Check win condition
        if (heat === 100 && pressure === 100 && danger === 100) {
            triggerExplosion();
        }
    }

    function pressButton(action) {
        switch (action) {
            case 'heat':
                heat += 20;
                pressure = Math.min(100, pressure + 5);
                danger = Math.max(0, danger - 2); // Slight risk reduction initially (overheating not immediate danger)
                break;
            case 'vent':
                pressure += 50; // Opens vents → vacuum (high "pressure index")
                heat -= 15;
                danger += 40;
                break;
            case 'cool':
                heat -= 35;
                pressure -= 20;
                danger -= 30;
                break;
        }
        
        updateGauges();
    }

    function triggerExplosion() {
        const body = document.body;
        const cracks = document.getElementById('cracks');
        const shatter = document.getElementById('shatter');
        const resetMsg = document.getElementById('reset-msg');

        // Shake effect
        body.classList.add('shake');
        
        setTimeout(() => {
            // Show cracks
            cracks.classList.add('active');
            
            setTimeout(() => {
                // Flash screen white
                shatter.classList.add('active');
                
                setTimeout(() => {
                    // Reset everything
                    heat = 0;
                    pressure = 100;
                    danger = 0;
                    
                    updateGauges();
                    body.classList.remove('shake');
                    cracks.classList.remove('active');
                    shatter.classList.remove('active');
                    
                    resetMsg.classList.add('show');
                    setTimeout(() => {
                        resetMsg.classList.remove('show');
                    }, 2500);
                }, 300);
            }, 1000);
        }, 500);
    }

    // Initialize
    updateGauges();
</script>

</body>
</html>
