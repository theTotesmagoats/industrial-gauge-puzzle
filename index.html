<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS ORBITAL STATION - COMMAND</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #020408;
            --screen-bg: #060b12;
            --primary-color: #ffffff; 
            --enemy-color: #ff3333;    
            --friendly-color: #39ff14; 
            --mystery-color: #33ccff;  
            --viper-color: #ffffff;
            --warn-color: #ffaa00;
            --info-color: #33ccff;
            --alert-color: #ff3333;
            --panel-border: 2px solid #1a2b3c;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--primary-color);
            font-family: 'Courier New', Courier, monospace; height: 100vh; overflow: hidden; user-select: none;
        }

        #bridge {
            display: grid; grid-template-columns: 310px 1fr 280px; grid-template-rows: 70px 1fr 240px;
            gap: 12px; padding: 15px; height: 100vh;
        }

        .panel {
            background-color: var(--screen-bg); border: var(--panel-border); border-radius: 8px;
            padding: 12px; box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; position: relative; overflow: hidden;
            transition: border-color 0.3s;
        }

        .header-bar {
            background-color: #0d1a26; border-bottom: 1px solid var(--info-color); padding: 4px;
            text-align: center; font-weight: bold; letter-spacing: 2px; color: var(--primary-color);
            text-transform: uppercase; font-size: 0.9em; margin-bottom: 8px;
        }

        .top-left { grid-column: 1; grid-row: 1 / span 2; display: flex; flex-direction: column; gap: 10px; }
        .main-view-container { grid-column: 2; grid-row: 1 / span 3; display: flex; flex-direction: column; gap: 12px; }
        .top-right { grid-column: 3; grid-row: 1 / span 2; }

        #main-view {
            flex-grow: 1; background-color: #000102; border-radius: 8px; position: relative;
            overflow: hidden; border: 2px solid var(--primary-color);
            box-shadow: inset 0 0 80px rgba(0,0,0,1); cursor: crosshair;
        }

        canvas#tactical-display { width: 100%; height: 100%; display: block; position: absolute; }

        .view-overlay { position: absolute; top: 20px; left: 20px; z-index: 11; pointer-events: none; text-shadow: 0 0 5px #000; }

        .bottom-left { grid-column: 1; grid-row: 3; }
        .bridge-controls { grid-column: 2; grid-row: 3; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

        .scroll-list { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; flex-grow: 1; }
        .list-item {
            background-color: rgba(255,255,255,0.05); padding: 6px; border-radius: 4px;
            display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #fff;
        }

        .health-bar { width: 100%; height: 4px; background-color: #1a2b3c; border-radius: 2px; overflow: hidden; margin-top: 4px; }
        .health-fill { height: 100%; transition: width 0.2s; }

        #comms-log { font-size: 0.8em; overflow-y: auto; flex-grow: 1; color: #ccc; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 2px; }

        button {
            background-color: rgba(255,255,255,0.05); color: #fff; border: 1px solid #fff;
            padding: 6px; cursor: pointer; font-family: inherit; font-weight: bold; border-radius: 3px;
        }
        button:hover:not(:disabled) { background-color: rgba(255,255,255,0.2); }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        .btn-alert { border-color: var(--enemy-color); color: var(--enemy-color); }
        .btn-info { border-color: var(--mystery-color); color: var(--mystery-color); }
        .btn-warn { border-color: var(--warn-color); color: var(--warn-color); }

        .btn-mode.active { background-color: #fff; color: #000; }
    </style>
</head>
<body>
    <div id="bridge">
        <div class="panel top-left">
            <div class="header-bar">FIGHTER SQUADRON</div>
            <button id="btn-deploy-squad" onclick="game.toggleAllFighters()">LAUNCH ALL</button>
            <div class="scroll-list" id="fighter-list"></div>
            <div style="border-top: 2px solid #1a2b3c; margin: 5px 0;"></div>
            <div class="header-bar">SECURITY DETACHMENT</div>
            <button id="btn-deploy-crew" onclick="game.deployAwayTeam()">FORAGE PLANET</button>
            <div class="scroll-list" id="crew-list"></div>
        </div>

        <div class="panel bottom-left" id="mission-panel">
            <div class="header-bar">SUB-SPACE DISPATCH</div>
            <div id="mission-content" style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 8px; font-size: 0.85em;">
                <div style="color: #555;">NO SIGNALS DETECTED.</div>
            </div>
        </div>

        <div class="main-view-container">
            <div class="panel" style="padding: 0;">
                <div class="header-bar" style="margin-bottom: 0; background: #081a2b; display: flex; justify-content: space-between; padding: 6px 15px;">
                    <span>ATLAS ORBITAL STATION</span>
                    <span>SCORE: <span id="val-score" style="color: var(--friendly-color);">0</span> | HI: <span id="val-highscore">0</span></span>
                </div>
            </div>
            <div id="main-view">
                <canvas id="tactical-display"></canvas>
                <div class="view-overlay">
                    <strong>RADAR:</strong> <br><span id="sensor-readings">SCANNING SECTOR</span>
                </div>
            </div>
            <div class="panel bridge-controls">
                <div>
                    <div class="header-bar">ORDNANCE</div>
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <button class="btn-warn" id="fire-phaser" disabled>PHASERS [-5 EN]</button>
                        <button class="btn-info" id="fire-torpedo" disabled>TORPEDO [<span id="torpedo-count">12</span>]</button>
                        <button class="btn-alert" id="fire-pulsar" disabled>PULSAR [<span id="pulsar-count">4</span>]</button>
                    </div>
                </div>
                <div>
                    <div class="header-bar">TARGETING</div>
                    <div id="target-locks" style="font-size: 0.8em; background: rgba(0,0,0,0.4); padding: 5px; height: 100px; overflow-y: auto;">
                        <div style="color:#555; text-align:center;">NO LOCKS</div>
                    </div>
                </div>
                <div id="ops-panel">
                    <div class="header-bar">ANALYSIS & OPS</div>
                    <div id="ops-default">
                        <button class="btn-info" id="btn-tractor" onclick="game.engageTractorBeam()" disabled style="width: 100%;">TRACTOR SCAN</button>
                    </div>
                    <div id="ops-action" style="display: none; flex-direction: column; gap: 4px;">
                        <button class="btn-alert" onclick="game.arrestShip()">BOARD & ARREST</button>
                        <button class="btn-warn" onclick="game.releaseShip()">RELEASE</button>
                    </div>
                    <div id="ops-unidentified" style="display: none; flex-direction: column; gap: 4px;">
                        <button class="btn-warn" onclick="game.boardUnidentified()">BOARD</button>
                        <button class="btn-alert" onclick="game.attackUnidentified()">ENGAGE</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel top-right">
            <div class="header-bar">STATION RESOURCES</div>
            <div class="system-grid">
                <div class="system-item">
                    <span>SHIELDS <span id="val-shields" style="float:right;">100%</span></span>
                    <div class="health-bar"><div class="health-fill" id="bar-shields" style="width:100%; background:var(--info-color);"></div></div>
                </div>
                <div class="system-item">
                    <span>HULL <span id="val-hull" style="float:right;">100%</span></span>
                    <div class="health-bar"><div class="health-fill" id="bar-hull" style="width:100%; background:var(--friendly-color);"></div></div>
                </div>
                <div class="system-item">
                    <span>ENERGY <span id="val-energy" style="float:right;">100%</span></span>
                    <div class="health-bar"><div class="health-fill" id="bar-energy" style="width:100%; background:#fff;"></div></div>
                </div>
                <div class="system-item">
                    <span>SUPPLIES <span id="val-supplies" style="float:right;">100%</span></span>
                    <div class="health-bar"><div class="health-fill" id="bar-supplies" style="width:100%; background:var(--warn-color);"></div></div>
                </div>
            </div>
            <div style="margin-top: 15px; border-top: 1px solid #1a2b3c; padding-top: 10px;">
                <button class="btn-mode" id="mode-shields" onclick="game.setPowerMode('SHIELDS')">🛡️ SHD</button>
                <button class="btn-mode active" id="mode-systems" onclick="game.setPowerMode('SYSTEMS')">⚙️ SYS</button>
                <button class="btn-mode" id="mode-weapons" onclick="game.setPowerMode('WEAPONS')">🔫 WPN</button>
            </div>
            <div style="margin-top: 10px; font-size: 0.85em;">
                CREDITS: <span id="res-credits" style="color:var(--friendly-color);">0</span><br>
                DATA: <span id="res-data" style="color:var(--warn-color);">0</span>
            </div>
        </div>

        <div class="panel bottom-right">
            <div class="header-bar">STATION LOGS</div>
            <div id="comms-log"></div>
        </div>
    </div>

    <script>
        class USSAtlasGame {
            constructor() {
                this.systems = { hull: 100, shields: 100, energy: 100, supplies: 100, morale: 100 };
                this.resources = { credits: 0, data: 0 };
                this.ammo = { torpedoes: 12, pulsars: 4 };
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('atlas_highscore')) || 0;
                this.powerMode = 'SYSTEMS';
                this.shieldLockout = 0;
                this.missionState = 'NONE';
                this.activeMission = null;
                this.lullTimer = 35; // CRITICAL FIX: Initialized lull variables
                this.lullActive = false;
                this.timeElapsed = 0;

                this.crew = Array.from({length: 7}, (_, i) => ({ 
                    id: i, name: ["VANCE", "KOWALSKI", "CHEN", "ARIS", "MAJOR", "TARN", "RIZZO"][i], 
                    hp: 100, deployed: false 
                }));
                this.crewMissionActive = false;

                this.fighters = Array.from({length: 6}, (_, i) => ({
                    id: i, callsign: `VIPER-${i+1}`, hp: 100, alive: true, deployed: false,
                    x: 0, y: 0, z: 0, speed: 0.04, rebuilding: 0, target: null, idleAngle: Math.random()*6.28
                }));

                this.targets = [];
                this.lockedTargets = [];
                this.projectiles = [];
                this.particles = [];
                this.warpStreaks = [];

                this.canvas = document.getElementById('tactical-display');
                this.ctx = this.canvas.getContext('2d');
                this.shipX = 0; this.shipY = 0;
                this.mouseX = -100; this.mouseY = -100;
                
                this.globeNodes = [];
                this.globeRadius = 130;
                this.angleX = 0.5; this.angleY = 0;
                this.audioCtx = null;
                
                this.init();
            }

            init() {
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
                for (let lat = -90; lat <= 90; lat += 20) {
                    for (let lon = 0; lon < 360; lon += 20) {
                        let lr = lat * 0.0174, ln = lon * 0.0174;
                        this.globeNodes.push({
                            x: this.globeRadius * Math.cos(lr) * Math.cos(ln),
                            y: this.globeRadius * Math.sin(lr),
                            z: this.globeRadius * Math.cos(lr) * Math.sin(ln)
                        });
                    }
                }
                this.canvas.addEventListener('mousemove', e => {
                    const r = this.canvas.getBoundingClientRect();
                    this.mouseX = e.clientX - r.left; this.mouseY = e.clientY - r.top;
                });
                this.canvas.addEventListener('click', () => {
                    if(!this.audioCtx) this.initAudio();
                    this.attemptLock();
                });

                document.getElementById('fire-phaser').onclick = () => this.fireWeapon('phaser');
                document.getElementById('fire-torpedo').onclick = () => this.fireWeapon('torpedo');
                document.getElementById('fire-pulsar').onclick = () => this.fireWeapon('pulsar');

                setInterval(() => this.systemTick(), 1000);
                requestAnimationFrame(() => this.renderLoop());
            }

            resizeCanvas() {
                const r = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = r.width; this.canvas.height = r.height;
                this.shipX = r.width / 2; this.shipY = r.height;
            }

            initAudio() {
                try {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    this.log("Audio Systems Online.");
                } catch(e) {}
            }

            playSound(freq, dur, type='sine', vol=0.1) {
                if(!this.audioCtx) return;
                try {
                    const o = this.audioCtx.createOscillator();
                    const g = this.audioCtx.createGain();
                    o.type = type; o.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
                    g.gain.setValueAtTime(vol, this.audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + dur);
                    o.connect(g); g.connect(this.audioCtx.destination);
                    o.start(); o.stop(this.audioCtx.currentTime + dur);
                } catch(e) {}
            }

            project3D(x, y, z, cx, cy, cX, sX, cY, sY) {
                let y1 = y * cX - z * sX;
                let z1 = y * sX + z * cX;
                let x2 = x * cY - z1 * sY;
                let z2 = x * sY + z1 * cY;
                let d = 250 + z2; if(d < 1) d = 1; // CRITICAL FIX: Math Clamp
                let s = 250 / d;
                return { px: cx + x2 * s, py: cy + y1 * s, s: s, depth: z2 };
            }

            systemTick() {
                if(this.lullTimer > 0) this.lullTimer--;
                else { this.lullActive = !this.lullActive; this.lullTimer = this.lullActive ? 12 : 35; }

                this.systems.energy = Math.min(100, this.systems.energy + (this.powerMode === 'WEAPONS' ? 4 : 2));
                this.systems.hull = Math.min(100, this.systems.hull + (this.powerMode === 'SYSTEMS' ? 0.5 : 0));
                if(this.powerMode === 'SHIELDS' && this.shieldLockout <= 0) this.systems.shields = Math.min(100, this.systems.shields + 2);
                if(this.shieldLockout > 0) this.shieldLockout--;

                if(this.missionState === 'NONE' && Math.random() < 0.05) this.generateMission();
                if(this.missionState === 'PENDING') {
                    this.activeMission.timeout--;
                    if(this.activeMission.timeout <= 0) this.missionState = 'NONE';
                }
                if(this.missionState === 'ACTIVE') {
                    this.activeMission.progress++;
                    if(this.activeMission.progress >= this.activeMission.duration) this.completeMission(true);
                }

                if(!this.lullActive && Math.random() < 0.2 && this.targets.length < 15) {
                    let type = Math.random() < 0.3 ? 'mystery' : (Math.random() < 0.7 ? 'friendly' : 'enemy');
                    this.targets.push({
                        id: (type === 'enemy' ? 'KLI-' : 'V-') + Math.floor(Math.random()*900+100),
                        faction: type, color: type === 'mystery' ? '#33ccff' : (type === 'friendly' ? '#39ff14' : '#ff3333'),
                        orbitRadius: this.globeRadius + 60 + Math.random()*100,
                        angle: Math.random()*6.28, speed: 0.005 + Math.random()*0.01,
                        yOffset: (Math.random()-0.5)*150, hp: 100, alive: true, frozen: false
                    });
                }

                this.targets.forEach(t => {
                    if(t.faction === 'enemy' && Math.random() < 0.1 && !t.frozen) {
                        this.projectiles.push({ type: 'enemy_beam', from: t, progress: 0 });
                    }
                });

                this.updateUI();
                this.renderUI_Lists();
                this.updateMissionUI();
                this.timeElapsed++;
            }

            // CRITICAL FIX: Restoration of missing handlers
            engageTractorBeam() {
                let tgt = this.lockedTargets.find(t => t.faction === 'mystery');
                if(!tgt || this.systems.energy < 10) return;
                this.systems.energy -= 10;
                tgt.frozen = true;
                this.log("Scanner locking on " + tgt.id + "...");
                setTimeout(() => {
                    if(!tgt.alive) return;
                    tgt.frozen = false;
                    let roll = Math.random();
                    if(roll < 0.4) {
                        tgt.faction = 'enemy'; tgt.color = '#ff3333';
                        this.log("ALERT: Hostile intent confirmed.");
                        document.getElementById('ops-default').style.display = 'none';
                        document.getElementById('ops-action').style.display = 'flex';
                    } else if(roll < 0.7) {
                        tgt.faction = 'friendly'; tgt.color = '#39ff14';
                        this.log("Vessel cleared.");
                    } else {
                        this.log("Scan inconclusive. Shielding detected.");
                        document.getElementById('ops-default').style.display = 'none';
                        document.getElementById('ops-unidentified').style.display = 'flex';
                    }
                    this.updateTargetUI();
                }, 2000);
            }

            arrestShip() {
                this.log("Security Team boarding...");
                this.completeOps();
                if(Math.random() < 0.8) { this.addScore(150); this.resources.credits += 100; this.log("Success."); }
                else { this.log("Team met resistance. Casualties reported."); this.systems.morale -= 20; }
            }

            boardUnidentified() {
                this.log("Teleporting team...");
                this.completeOps();
                if(Math.random() < 0.5) { this.addScore(200); this.log("Smuggler secured."); }
                else { this.log("Ambush! Target engaging."); }
            }

            attackUnidentified() {
                let tgt = this.lockedTargets[0];
                if(tgt) { tgt.faction = 'enemy'; tgt.color = '#ff3333'; }
                this.completeOps();
            }

            releaseShip() { this.log("Vessel released."); this.completeOps(); }
            completeOps() {
                let tgt = this.lockedTargets[0]; if(tgt) tgt.alive = false;
                document.getElementById('ops-default').style.display = 'block';
                document.getElementById('ops-action').style.display = 'none';
                document.getElementById('ops-unidentified').style.display = 'none';
            }

            generateMission() {
                this.activeMission = { title: "ESCORT SOS", type: Math.random() > 0.5 ? 'SQUAD' : 'CREW', duration: 20, progress: 0, timeout: 15 };
                this.missionState = 'PENDING';
                this.playSound(600, 0.5, 'square');
            }

            acceptMission() {
                if(this.activeMission.type === 'SQUAD') {
                    this.fighters.forEach(f => f.deployed = false);
                } else {
                    this.crew.forEach(c => c.deployed = false);
                    this.crewMissionActive = false;
                }
                this.missionState = 'ACTIVE';
                this.spawnWarpOut(3, '#fff');
            }

            completeMission(win) {
                if(win) {
                    this.addScore(250, "Dispatch Success");
                    this.resources.credits += 150;
                    this.ammo.torpedoes = Math.min(20, this.ammo.torpedoes + 3);
                }
                this.missionState = 'NONE';
                this.updateMissionUI();
            }

            spawnWarpOut(n, col, incoming=false) {
                for(let i=0; i<n; i++) this.warpStreaks.push({ x:0, y:0, z:0, vx:(Math.random()-0.5)*40, vy: incoming?20:-20, vz:(Math.random()-0.5)*40, col:col, life:1.0 });
            }

            fireWeapon(type) {
                if(this.lockedTargets.length === 0 && type !== 'pulsar') return;
                let cost = type === 'phaser' ? 5 : (type === 'torpedo' ? 15 : 50);
                if(!this.consumeEnergy(cost)) return;

                if(type === 'phaser') {
                    this.playSound(400, 0.2, 'sawtooth');
                    this.lockedTargets.forEach(t => {
                        this.projectiles.push({ type: 'beam', to: t, progress: 0, col: '#ff3333' });
                    });
                } else if(type === 'torpedo') {
                    this.ammo.torpedoes--;
                    this.playSound(200, 0.5, 'square');
                    this.projectiles.push({ type: 'torp', to: this.lockedTargets[0], x: this.shipX, y: this.shipY, angle: Math.atan2(this.lockedTargets[0].py - this.shipY, this.lockedTargets[0].px - this.shipX), speed: 8 });
                } else if(type === 'pulsar') {
                    this.ammo.pulsars--;
                    this.shieldLockout = 10; this.systems.shields = 0;
                    this.projectiles.push({ type: 'pulsar', r: 0 });
                    this.targets.forEach(t => { if(t.alive) { t.hp -= 100; if(t.hp<=0) { t.alive = false; this.addScore(100); } } });
                    this.lockedTargets = [];
                }
            }

            consumeEnergy(v) {
                if(this.systems.energy >= v) { this.systems.energy -= v; return true; }
                this.playSound(150, 0.2, 'square'); return false;
            }

            attemptLock() {
                let hit = null; let min = 40;
                this.targets.forEach(t => {
                    let d = Math.hypot(t.px - this.mouseX, t.py - this.mouseY);
                    if(d < min) { min = d; hit = t; }
                });
                if(hit) {
                    let idx = this.lockedTargets.indexOf(hit);
                    if(idx > -1) this.lockedTargets.splice(idx, 1);
                    else if(this.lockedTargets.length < 2) { this.lockedTargets.push(hit); this.playSound(800, 0.1, 'square'); }
                } else this.lockedTargets = [];
                this.updateTargetUI();
            }

            updateTargetUI() {
                const con = document.getElementById('target-locks');
                con.innerHTML = this.lockedTargets.length ? this.lockedTargets.map(t => `<div>LOCK: ${t.id} [${t.faction.toUpperCase()}]</div>`).join('') : '<div style="color:#555; text-align:center;">NO LOCKS</div>';
                document.getElementById('fire-phaser').disabled = !this.lockedTargets.length;
                document.getElementById('fire-torpedo').disabled = this.ammo.torpedoes <= 0 || !this.lockedTargets.length;
                document.getElementById('fire-pulsar').disabled = this.ammo.pulsars <= 0;
                document.getElementById('btn-tractor').disabled = !this.lockedTargets.some(t => t.faction === 'mystery');
            }

            updateUI() {
                const set = (id, v) => {
                    document.getElementById(`val-${id}`).innerText = Math.floor(v) + '%';
                    document.getElementById(`bar-${id}`).style.width = Math.floor(v) + '%';
                };
                set('shields', this.systems.shields); set('hull', this.systems.hull); set('energy', this.systems.energy); set('supplies', this.systems.supplies);
                document.getElementById('res-credits').innerText = this.resources.credits;
                document.getElementById('res-data').innerText = this.resources.data;
                document.getElementById('torpedo-count').innerText = this.ammo.torpedoes;
                document.getElementById('pulsar-count').innerText = this.ammo.pulsars;
                document.getElementById('val-score').innerText = this.score;
            }

            renderUI_Lists() {
                const fl = document.getElementById('fighter-list');
                fl.innerHTML = this.fighters.map(f => `
                    <div class="list-item" style="opacity:${f.alive?1:0.2}">
                        <span style="font-size:0.7em;">${f.callsign}</span>
                        <div style="width:60px" class="health-bar"><div class="health-fill" style="width:${f.hp}%; background:#fff"></div></div>
                        <button style="font-size:0.5em; padding:2px;" ${!f.alive?'disabled':''} onclick="game.toggleFighter(${f.id})">${f.deployed?'REC':'LNC'}</button>
                    </div>
                `).join('');

                const cl = document.getElementById('crew-list');
                cl.innerHTML = this.crew.map(c => `
                    <div class="list-item" style="opacity:${c.hp>0?1:0.2}">
                        <span style="font-size:0.7em;">${c.name}</span>
                        <div style="width:60px" class="health-bar"><div class="health-fill" style="width:${c.hp}%; background:var(--friendly-color)"></div></div>
                    </div>
                `).join('');
            }

            toggleFighter(id) {
                let f = this.fighters[id]; if(!f.alive) return;
                f.deployed = !f.deployed;
                this.renderUI_Lists();
            }

            toggleAllFighters() {
                let any = this.fighters.some(f => f.deployed);
                this.fighters.forEach(f => { if(f.alive) f.deployed = !any; });
                this.renderUI_Lists();
            }

            deployAwayTeam() {
                if(!this.crewMissionActive) {
                    this.crewMissionActive = true;
                    this.crew.forEach(c => { if(c.hp > 0) c.deployed = true; });
                    this.log("Team on planet surface.");
                } else {
                    this.crewMissionActive = false;
                    this.crew.forEach(c => c.deployed = false);
                    this.log("Team recalled.");
                }
                this.renderUI_Lists();
            }

            updateMissionUI() {
                const c = document.getElementById('mission-content');
                if(this.missionState === 'NONE') c.innerHTML = '<div style="color:#555;">NO SIGNALS.</div>';
                else if(this.missionState === 'PENDING') c.innerHTML = `<div>${this.activeMission.title}</div><button onclick="game.acceptMission()">DISPATCH</button>`;
                else c.innerHTML = `<div>ON MISSION</div><div class="health-bar"><div class="health-fill" style="width:${(this.activeMission.progress/this.activeMission.duration)*100}%"></div></div>`;
            }

            renderLoop() {
                const w = this.canvas.width, h = this.canvas.height, cx = w/2, cy = h/2;
                this.ctx.clearRect(0,0,w,h);
                this.angleY += 0.002;
                const cX = Math.cos(this.angleX), sX = Math.sin(this.angleX), cY = Math.cos(this.angleY), sY = Math.sin(this.angleY);

                // Radar Sweep (Dynamic Edge-to-Edge)
                const sweep = (Date.now() / 800) % 6.28;
                const rad = Math.sqrt(cx*cx + cy*cy);
                this.ctx.fillStyle = "rgba(51, 204, 255, 0.05)";
                this.ctx.beginPath(); this.ctx.moveTo(cx, cy);
                this.ctx.arc(cx, cy, rad, sweep - 0.4, sweep);
                this.ctx.fill();

                this.ctx.fillStyle = "rgba(255,255,255,0.2)";
                this.globeNodes.forEach(n => {
                    let p = this.project3D(n.x, n.y, n.z, cx, cy, cX, sX, cY, sY);
                    if(p.depth < 0) this.ctx.fillRect(p.px, p.py, 2, 2);
                });

                this.targets.forEach(t => {
                    if(!t.alive) return;
                    t.angle += t.speed;
                    let tx = t.orbitRadius * Math.cos(t.angle), tz = t.orbitRadius * Math.sin(t.angle);
                    let p = this.project3D(tx, t.yOffset, tz, cx, cy, cX, sX, cY, sY);
                    t.px = p.px; t.py = p.py;
                    this.ctx.fillStyle = t.color;
                    this.ctx.beginPath(); this.ctx.arc(p.px, p.py, 5*p.s, 0, 6.28); this.ctx.fill();
                    if(this.lockedTargets.includes(t)) {
                        this.ctx.strokeStyle = "#fff"; this.ctx.strokeRect(p.px-10, p.py-10, 20, 20);
                    }
                });

                this.fighters.forEach(f => {
                    if(f.deployed && f.alive) {
                        f.idleAngle += 0.04;
                        let tx = 160 * Math.cos(f.idleAngle), tz = 160 * Math.sin(f.idleAngle);
                        let p = this.project3D(tx, 40, tz, cx, cy, cX, sX, cY, sY);
                        f.px = p.px; f.py = p.py;
                        this.ctx.fillStyle = "#fff";
                        this.ctx.beginPath(); this.ctx.moveTo(p.px, p.py-6); this.ctx.lineTo(p.px+5, p.py+5); this.ctx.lineTo(p.px-5, p.py+5); this.ctx.fill();
                    }
                });

                for(let i=this.projectiles.length-1; i>=0; i--) {
                    let p = this.projectiles[i];
                    if(p.type === 'beam') {
                        p.progress += 0.15;
                        this.ctx.strokeStyle = p.col; this.ctx.lineWidth = 3;
                        this.ctx.beginPath(); this.ctx.moveTo(this.shipX, this.shipY);
                        this.ctx.lineTo(this.shipX + (p.to.px-this.shipX)*p.progress, this.shipY + (p.to.py-this.shipY)*p.progress);
                        this.ctx.stroke();
                        if(p.progress>=1) { p.to.alive = false; this.projectiles.splice(i,1); }
                    } else if(p.type === 'enemy_beam') {
                        p.progress += 0.08;
                        this.ctx.strokeStyle = "#f00"; this.ctx.lineWidth = 2;
                        this.ctx.beginPath(); this.ctx.moveTo(p.from.px, p.from.py);
                        this.ctx.lineTo(p.from.px + (cx-p.from.px)*p.progress, p.from.py + (cy-p.from.py)*p.progress);
                        this.ctx.stroke();
                        if(p.progress>=1) { this.systems.hull -= 2; this.projectiles.splice(i,1); this.triggerShake(5); }
                    } else if(p.type === 'pulsar') {
                        p.r += 12; this.ctx.strokeStyle = "#ffaa00"; this.ctx.lineWidth = 4;
                        this.ctx.beginPath(); this.ctx.arc(this.shipX, this.shipY, p.r, 0, 6.28); this.ctx.stroke();
                        if(p.r > rad*2) this.projectiles.splice(i,1);
                    }
                }
                requestAnimationFrame(() => this.renderLoop());
            }

            log(msg) {
                const l = document.getElementById('comms-log');
                const e = document.createElement('div'); e.className = 'log-entry';
                e.innerHTML = `<span>[${new Date().toLocaleTimeString()}]</span> ${msg}`;
                l.prepend(e);
            }
        }
        window.onload = () => { window.game = new USSAtlasGame(); };
    </script>
</body>
